const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(160deg,#050D1F 0%,#0B1A3E 50%,#070F28 100%);
  min-height:100vh; color:#E2E8F0; -webkit-font-smoothing:antialiased;
}
button,input,select,textarea { font-family:'DM Sans',sans-serif; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:rgba(255,255,255,.04); }
::-webkit-scrollbar-thumb { background:rgba(96,165,250,.4); border-radius:3px; }

/* \u2500\u2500 NAV PILLS \u2500\u2500 */
.ap-pill {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:50px;
  font-size:13px; font-weight:700; cursor:pointer;
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.72); background:rgba(255,255,255,.06);
  transition:all .18s; white-space:nowrap;
}
.ap-pill:hover  { background:rgba(37,99,235,.35); border-color:rgba(96,165,250,.5); color:#fff; }
.ap-pill.active { background:rgba(37,99,235,.55); border-color:#3B82F6; color:#fff; box-shadow:0 0 16px rgba(59,130,246,.3); }

/* \u2500\u2500 CARDS \u2500\u2500 */
.ap-card {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px; padding:24px;
  backdrop-filter:blur(12px);
  transition:border-color .2s, box-shadow .2s;
}

/* \u2500\u2500 INPUTS \u2500\u2500 */
.ap-input {
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:10px 14px;
  color:#E2E8F0; font-size:14px; outline:none;
  transition:border-color .18s, box-shadow .18s;
  appearance:none; -webkit-appearance:none;
}
.ap-input:focus   { border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
.ap-input::placeholder { color:#334155; }
.ap-input.err     { border-color:#EF4444 !important; box-shadow:0 0 0 3px rgba(239,68,68,.12); }
.ap-input option  { background:#0B1A3E; color:#E2E8F0; }
.ap-label {
  font-size:11px; font-weight:700; color:#93C5FD;
  letter-spacing:.05em; text-transform:uppercase;
  margin-bottom:6px; display:block;
}

/* \u2500\u2500 BUTTONS \u2500\u2500 */
.ap-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 24px; border-radius:50px; border:none;
  font-size:14px; font-weight:800; cursor:pointer; transition:all .18s;
}
.ap-btn-primary { background:linear-gradient(135deg,#2563EB,#3B82F6); color:#fff; box-shadow:0 4px 20px rgba(37,99,235,.4); }
.ap-btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(37,99,235,.5); }
.ap-btn-secondary { background:rgba(255,255,255,.08); color:#E2E8F0; border:1px solid rgba(255,255,255,.15); }
.ap-btn-secondary:hover { background:rgba(255,255,255,.14); }
.ap-btn-success { background:linear-gradient(135deg,#059669,#10B981); color:#fff; box-shadow:0 4px 16px rgba(5,150,105,.35); }
.ap-btn-success:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(5,150,105,.45); }
.ap-btn-danger  { background:linear-gradient(135deg,#DC2626,#EF4444); color:#fff; }
.ap-btn-danger:hover { transform:translateY(-1px); }
.ap-btn-sm { padding:7px 16px; font-size:12px; }
.ap-btn:disabled { opacity:.42; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

/* \u2500\u2500 KPI CARDS \u2500\u2500 */
.kpi-card {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  border-radius:16px; padding:20px 22px;
  display:flex; flex-direction:column; gap:4px;
}
.kpi-label { font-size:11px; font-weight:700; color:#64748B; letter-spacing:.08em; text-transform:uppercase; }
.kpi-val   { font-size:28px; font-weight:800; font-family:'DM Mono',monospace; letter-spacing:-1px; }
.kpi-sub   { font-size:12px; color:#64748B; }

/* \u2500\u2500 TABLE \u2500\u2500 */
.ap-table { width:100%; border-collapse:collapse; }
.ap-table th { text-align:left; padding:10px 14px; font-size:11px; font-weight:700; color:#64748B; letter-spacing:.06em; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,.07); }
.ap-table td { padding:11px 14px; font-size:13px; border-bottom:1px solid rgba(255,255,255,.04); color:#CBD5E1; }
.ap-table tr:hover td { background:rgba(255,255,255,.03); }
.ap-table tr:last-child td { border-bottom:none; }

/* \u2500\u2500 CHECKBOXES \u2500\u2500 */
.ap-check {
  display:flex; gap:10px; cursor:pointer; align-items:flex-start;
  padding:12px 14px; border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03); transition:border-color .18s;
}
.ap-check:has(input:checked) { border-color:rgba(59,130,246,.4); background:rgba(37,99,235,.08); }
.ap-check input[type=checkbox] { width:18px; height:18px; flex-shrink:0; margin-top:1px; accent-color:#3B82F6; cursor:pointer; }

/* \u2500\u2500 PHONE INPUT \u2500\u2500 */
.phone-wrap { display:flex; }
.phone-prefix {
  background:rgba(37,99,235,.18); border:1px solid rgba(59,130,246,.3);
  border-right:none; border-radius:12px 0 0 12px;
  padding:10px 14px; font-size:14px; color:#93C5FD; font-weight:700;
  white-space:nowrap; flex-shrink:0; display:flex; align-items:center;
}
.phone-input { border-radius:0 12px 12px 0 !important; }

/* \u2500\u2500 TOGGLE \u2500\u2500 */
.toggle { width:44px; height:24px; border-radius:12px; background:rgba(255,255,255,.1); position:relative; transition:background .2s; flex-shrink:0; border:1px solid rgba(255,255,255,.12); cursor:pointer; }
.toggle.on { background:#2563EB; border-color:#3B82F6; }
.toggle-thumb { width:18px; height:18px; border-radius:50%; background:#fff; position:absolute; top:2px; left:2px; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.3); }
.toggle.on .toggle-thumb { left:22px; }

/* \u2500\u2500 SLIDER \u2500\u2500 */
.ap-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px; outline:none; cursor:pointer; border:none; }
.ap-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#3B82F6; cursor:pointer; box-shadow:0 0 0 3px rgba(59,130,246,.3),0 2px 8px rgba(0,0,0,.4); }
.ap-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:#3B82F6; cursor:pointer; border:none; }

/* \u2500\u2500 MISC \u2500\u2500 */
.ap-divider { height:1px; background:rgba(255,255,255,.07); margin:20px 0; }
.ap-scroll  { overflow-x:auto; }
.section-title { font-size:24px; font-weight:800; color:#F1F5F9; letter-spacing:-.5px; }
.section-sub   { font-size:14px; color:#64748B; margin-top:4px; }
.mono { font-family:'DM Mono',monospace; }

.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
@media(max-width:900px) { .grid-4 { grid-template-columns:repeat(2,1fr); } .grid-3 { grid-template-columns:repeat(2,1fr); } }
@media(max-width:580px) { .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; } .ap-card { padding:16px 14px; } .section-title { font-size:20px; } }

/* \u2500\u2500 ANIMATIONS \u2500\u2500 */
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.fadeup { animation:fadeUp .3s ease; }
.featured-badge {
  background:linear-gradient(90deg,#F59E0B,#FBBF24,#F59E0B);
  background-size:200%; animation:shimmer 2.2s infinite;
  color:#000; font-size:10px; font-weight:800; padding:2px 9px; border-radius:50px;
}

/* \u2500\u2500 RESULT CARD \u2500\u2500 */
.val-result {
  background:linear-gradient(135deg,rgba(37,99,235,.10),rgba(59,130,246,.05));
  border:1px solid rgba(59,130,246,.22); border-radius:20px; padding:24px;
  animation:fadeUp .3s ease;
}

/* \u2500\u2500 ADMIN SIDEBAR \u2500\u2500 */
.admin-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; font-size:13px; font-weight:700; cursor:pointer; border:1px solid transparent; color:rgba(255,255,255,.65); transition:all .15s; }
.admin-item:hover  { background:rgba(255,255,255,.06); color:#fff; }
.admin-item.active { background:rgba(37,99,235,.25); border-color:rgba(59,130,246,.4); color:#93C5FD; }

/* \u2500\u2500 MOBILE \u2500\u2500 */
@media(max-width:768px)  { .desktop-only { display:none !important; } .ap-burger { display:inline-flex !important; } }
@media(min-width:769px)  { .ap-burger { display:none !important; } }
