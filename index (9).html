/* \u2500\u2500 NAV PILLS \u2500\u2500 */

.ap-card {
  background:rgba(255,255,255,.04);

}

.ap-btn-danger  { background:linear-gradient(135deg,#DC2626,#EF4444); color:#fff; }
.ap-btn-danger:hover { transform:translateY(-1px); }
.ap-btn-sm { padding:7px 16px; font-size:12px; }

/* \u2500\u2500 KPI CARDS \u2500\u2500 */

:root {
  --p:       #00B47A;  --p-dk:  #008F60;  --p-lt:  #E6F7F1;  --p-xlt: #F3FCF8;
  --dark:    #163300;  --mid:   #1D4A35;  --text:  #0B2619;  --muted: #6B7E75;
  --border:  #E4EDE8;  --surf:  #F5F9F6;  --white: #FFFFFF;
  --pill:    9999px;   --r:     14px;     --r-lg:  22px;     --nav-h: 70px;
  --sh-xs:   0 1px 3px rgba(0,0,0,.06);
  --sh-sm:   0 2px 10px rgba(0,0,0,.07);
  --sh-md:   0 8px 30px rgba(0,0,0,.09);
  --sh-lg:   0 24px 72px rgba(0,0,0,.10);
  --sh-p:    0 8px 28px rgba(0,180,122,.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.5}
#root{position:relative}
button,input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.13);border-radius:2px}

/* KEYFRAMES */
@keyframes fadeUp   {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes scaleIn  {from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes floatUp  {0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes scrollX  {0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes shimmer  {0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes spin     {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulseDot {0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* UTILITY */
.fadeup   { animation:fadeUp .55s cubic-bezier(.22,.61,.36,1) both }
.fadein   { animation:fadeIn .4s ease both }

/* \u2500\u2500 TYPOGRAPHY \u2500\u2500 */
.hero-headline {
  font-size: clamp(44px,6.5vw,80px);
  font-weight: 800;
  line-height: 1.04;
  letter-spacing: -3px;
  color: var(--dark);
}
.hero-headline em { font-style:normal; color:var(--p) }
.hero-sub {
  font-size: clamp(16px,2vw,19px);
  color: var(--muted);
  line-height: 1.70;
  max-width: 500px;
}
.section-title {
  font-size: clamp(28px,4vw,46px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.10;
  color: var(--dark);
}
.section-sub {
  font-size: clamp(15px,1.6vw,17px);
  color: var(--muted);
  line-height: 1.70;
}
.sec-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--p);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* \u2500\u2500 NAVBAR \u2500\u2500 */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  height: var(--nav-h);
}
.nav-logo-text {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.8px;
  color: var(--dark);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 7px 14px;
  border-radius: 8px;
  transition: color .18s, background .18s;
}
.nav-link:hover, .nav-link.active { color: var(--dark); background: var(--p-lt); }
.nav-cta {
  font-size: 13px;
  font-weight: 700;
  background: var(--dark);
  color: #fff;
  border: none;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 50px;
  transition: background .18s, transform .18s;
}
.nav-cta:hover { background: var(--p-dk); transform: translateY(-1px); }

/* \u2500\u2500 HERO SECTION \u2500\u2500 */
.home-hero-section {
  background: #fff;
  padding: clamp(80px,11vw,140px) clamp(20px,5vw,40px) clamp(60px,8vw,100px);
  position: relative;
  overflow: hidden;
}
.home-hero-section::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 80% at 110% 50%, rgba(0,180,122,.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at -20% 80%, rgba(0,60,46,.04) 0%, transparent 70%);
  pointer-events: none;
}
.home-hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(40px,6vw,80px);
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
}
@media(max-width:840px) {
  .home-hero-grid { grid-template-columns: 1fr }
  .home-hero-right { display: none }
}
.home-hero-stats {
  display: flex;
  gap: clamp(20px,3vw,36px);
  margin-top: 44px;
  flex-wrap: wrap;
}
.stat-badge {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-badge .n {
  font-size: 24px;
  font-weight: 800;
  font-family: 'DM Mono', monospace;
  color: var(--dark);
  letter-spacing: -1px;
}
.stat-badge .l {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

/* \u2500\u2500 UI FLOAT CARD \u2500\u2500 */
.ui-float-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: var(--sh-lg);
  animation: floatUp 4s ease-in-out infinite;
}
.ui-float-card .val {
  font-size: 34px;
  font-weight: 800;
  font-family: 'DM Mono', monospace;
  letter-spacing: -2px;
  color: var(--dark);
}

/* \u2500\u2500 TRUST BAR \u2500\u2500 */
.trust-bar-wrap {
  background: #fff;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 18px 0;
}
.home-trust-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(20px,4vw,48px);
  flex-wrap: wrap;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 clamp(20px,5vw,40px);
}
.trust-bar-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}

/* \u2500\u2500 MODULE CARDS \u2500\u2500 */
.home-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}
.module-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  transition: border-color .22s, box-shadow .22s, transform .22s;
}
.module-card:hover {
  border-color: var(--p);
  box-shadow: 0 8px 32px rgba(0,180,122,.15);
  transform: translateY(-4px);
}
.module-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 16px;
}
.module-cta {
  margin-top: 20px;
  font-size: 13px;
  font-weight: 700;
  color: var(--p);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: gap .18s;
}
.module-card:hover .module-cta { gap: 8px; }

/* \u2500\u2500 BENEFITS SLIDER \u2500\u2500 */
.benefits-track-wrap { overflow: hidden; padding: 8px 0; }
.benefits-track {
  display: flex;
  gap: 20px;
  width: max-content;
  animation: scrollX 38s linear infinite;
}
.benefits-track:hover { animation-play-state: paused }
.benefit-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  width: 280px;
  flex-shrink: 0;
}
.home-steps-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}
@media(max-width:768px) { .home-steps-grid{grid-template-columns:1fr} }

/* \u2500\u2500 BUTTONS \u2500\u2500 */
.ap-btn-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--p);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  padding: 14px 28px;
  border-radius: var(--pill);
  transition: background .18s, transform .18s, box-shadow .18s;
  box-shadow: var(--sh-p);
}
.ap-btn-cta:hover { background: var(--p-dk); transform: translateY(-2px); box-shadow: 0 14px 36px rgba(0,180,122,.35); }
.ap-btn { display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:600; border:1.5px solid var(--border); cursor:pointer; padding:12px 22px; border-radius:var(--pill); transition:all .18s; background:#fff; color:var(--text); }
.ap-btn:hover { border-color:var(--p); color:var(--p); background:var(--p-lt); }
.ap-btn-primary   { background:var(--p); color:#fff; border-color:var(--p); }
.ap-btn-primary:hover { background:var(--p-dk); }
.ap-btn-secondary { background:#fff; border-color:var(--border); }
.ap-btn-secondary:hover { border-color:var(--p); color:var(--p); }
.ap-btn-ghost     { background:transparent; border-color:transparent; color:var(--muted); }
.ap-btn-ghost:hover { color:var(--dark); background:var(--p-lt); }

/* \u2500\u2500 CARDS / SURFACES \u2500\u2500 */
.ap-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh-xs);
}

/* \u2500\u2500 FORM ELEMENTS \u2500\u2500 */
.ap-label { font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:5px; letter-spacing:.02em }
.ap-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  background: #fff;
  transition: border-color .15s;
  outline: none;
}
.ap-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(0,180,122,.12); }
.ap-input::placeholder { color:#B5C5BF }
.ap-select { appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23637381'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center }

/* \u2500\u2500 LAYOUT HELPERS \u2500\u2500 */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px }
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}
.module-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px }
@media(max-width:600px){.module-form-grid{grid-template-columns:1fr}}

/* \u2500\u2500 TOGGLE \u2500\u2500 */
.toggle { width:44px; height:24px; border-radius:12px; background:#DDE5E0; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0 }
.toggle.on { background:var(--p) }
.toggle-thumb { position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:var(--sh-xs); transition:transform .18s cubic-bezier(.34,1.56,.64,1) }
.toggle.on .toggle-thumb { transform:translateX(20px) }

/* \u2500\u2500 FOOTER \u2500\u2500 */
.footer-grid {
  display: grid;
  grid-template-columns: 1.4fr repeat(3,1fr);
  gap: 40px;
}
@media(max-width:768px) { .footer-grid { grid-template-columns:1fr 1fr } }
@media(max-width:480px) { .footer-grid { grid-template-columns:1fr } }

/* \u2500\u2500 MOBILE DRAWER \u2500\u2500 */
.ap-burger { display:none; background:none; border:none; cursor:pointer; padding:8px; color:var(--dark); font-size:20px; }
.ap-drawer { position:fixed; inset:0; z-index:300 }
.ap-drawer-bg { position:absolute; inset:0; background:rgba(0,0,0,.35); backdrop-filter:blur(4px) }
.ap-drawer-panel { position:absolute; top:0; right:0; bottom:0; width:min(280px,85vw); background:#fff; box-shadow:var(--sh-lg); padding:24px 0; overflow-y:auto; animation:scaleIn .25s ease }
@media(max-width:768px) { .ap-burger { display:flex } .nav-links { display:none } }

/* \u2500\u2500 ADMIN \u2500\u2500 */
.admin-overlay {position:fixed;inset:0;z-index:200;background:rgba(11,28,22,.65);backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;padding:clamp(16px,3vw,32px)}
.admin-sheet {background:#fff;border-radius:24px;width:100%;max-width:840px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh-lg)}
.admin-header {padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-tabs {display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px}
.admin-tab-btn {flex-shrink:0;background:none;border:none;cursor:pointer;padding:11px 14px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.admin-tab-btn.active {color:var(--p);border-bottom-color:var(--p)}
.admin-body {flex:1;overflow-y:auto;padding:24px 28px}
@media(max-width:600px){.admin-body{padding:16px 16px}}

/* \u2500\u2500 LEADS PANEL \u2500\u2500 */
.leads-row {display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:center;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:13px}
.leads-row:hover{background:var(--surf)}

/* \u2500\u2500 INVENTORY SHOWROOM \u2500\u2500 */
.inventory-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.inv-card {background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
.inv-card:hover{box-shadow:var(--sh-md);transform:translateY(-3px)}
.inv-card-img {background:var(--surf);height:180px;display:flex;align-items:center;justify-content:center;font-size:48px}
.inv-card-body{padding:16px}
.inv-card-price{font-size:20px;font-weight:800;color:var(--dark);letter-spacing:-0.8px;font-family:'DM Mono',monospace}

/* \u2500\u2500 MODALS \u2500\u2500 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:var(--r-lg);padding:32px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:scaleIn .25s ease}

/* \u2500\u2500 STEP INDICATOR \u2500\u2500 */
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.step-dot.active{background:var(--p)}

/* \u2500\u2500 CREDITO TERMS \u2500\u2500 */
.credito-terms-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* \u2500\u2500 RESPONSIVE FIXES \u2500\u2500 */
@media(min-width:769px){.ap-burger{display:none !important}}
@media(max-width:600px){
  .module-form-grid{grid-template-columns:1fr !important}
  .credito-terms-grid{grid-template-columns:1fr !important}
}
