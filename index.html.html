// ─── DASHBOARD (v2) ────────────────────────────────────────────
function AdminDashboard({ session }) {
  const { tc } = React.useContext(AppCtx);
  const [leads, setLeads] = React.useState(() => loadLeads());
  const [period, setPeriod] = React.useState(7); // days

  React.useEffect(() => {
    const fn = () => setLeads(loadLeads());
    window.addEventListener("apLeadsUpdated", fn);
    return () => window.removeEventListener("apLeadsUpdated", fn);
  }, []);

  const now   = new Date();
  const since = d => { const dt = new Date(now); dt.setDate(dt.getDate() - d); return dt; };
  const inPeriod = l => new Date(l.createdAt) >= since(period);

  const periodLeads = leads.filter(inPeriod);
  const today       = leads.filter(l => l.createdAt.startsWith(new Date().toISOString().slice(0,10)));
  const byType      = leads.reduce((a,l)=>({...a,[l.type]:(a[l.type]||0)+1}),{});
  const waClicks    = (byType.comprar_whatsapp||0)+(byType.credito_whatsapp||0)+(byType.consigna_whatsapp||0);
  const convRate    = leads.length > 0 ? ((waClicks / leads.length)*100).toFixed(1) : "0.0";
  const credLeads   = leads.filter(l=>l.type==="credito_quote");
  const totalAmtS   = credLeads.reduce((s,l)=>s+(l.payload?.amountSoles||0),0);

  const kpis = [
    { l:"Total leads",      v:leads.length,       icon:"📥", c:"#3B82F6",  sub:`+${today.length} hoy` },
    { l:"Clicks WA",        v:waClicks,            icon:"💬", c:"#10B981",  sub:`${convRate}% conversión` },
    { l:"Tasaciones",       v:(byType.comprar_quote||0)+(byType.consigna_quote||0), icon:"🚗", c:"#F59E0B", sub:"Compra+consigna" },
    { l:"Solicitudes préstamo", v:credLeads.length,icon:"💳", c:"#8B5CF6",  sub:`$${Math.round(totalAmtS/tcVal/1000)}k solicitado` },
    { l:"Interés showroom", v:byType.showroom_interest||0, icon:"🏪", c:"#EC4899", sub:"Vistas con interés" },
    { l:"Período elegido",  v:periodLeads.length, icon:"📅", c:"#60A5FA",  sub:`Últimos ${period} días` },
  ];

  // Bar chart data
  const chartDays = [...Array(period)].map((_,i)=>{
    const d  = new Date(now); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    return { date:period<=14?ds.slice(5):ds.slice(5,8), count:leads.filter(l=>l.createdAt.startsWith(ds)).length };
  }).reverse();
  const maxC = Math.max(...chartDays.map(d=>d.count),1);

  // Module breakdown for period
  const mods = [
    { k:"comprar",  icon:"🚗", label:"Compramos",  c:"#3B82F6", types:["comprar_quote","comprar_whatsapp"] },
    { k:"credito",  icon:"💳", label:"Créditos",   c:"#8B5CF6", types:["credito_quote","credito_whatsapp"] },
    { k:"consigna", icon:"📋", label:"Consigna",   c:"#10B981", types:["consigna_quote","consigna_whatsapp","consigna_upload_start"] },
    { k:"showroom", icon:"🏪", label:"Showroom",   c:"#F59E0B", types:["showroom_interest"] },
  ];

  return (
    <div style={{ paddingTop:24 }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:10 }}>
        <div>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>Dashboard</h3>
          <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>
            Bienvenido, <span style={{ color:"#93C5FD" }}>{session.email}</span> · {new Date().toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long"})}
          </p>
        </div>
        <div style={{ display:"flex", gap:4 }}>
          {[7,14,30].map(d => (
            <button key={d} type="button" onClick={() => setPeriod(d)}
              style={{ padding:"6px 12px", borderRadius:50, border:`1px solid ${period===d?"#3B82F6":"rgba(255,255,255,.1)"}`, background:period===d?"rgba(37,99,235,.3)":"rgba(255,255,255,.04)", color:period===d?"#93C5FD":"#64748B", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit" }}>
              {d}d
            </button>
          ))}
        </div>
      </div>

      {/* KPIs */}
      <div className="grid-3" style={{ marginBottom:20 }}>
        {kpis.map(k => (
          <div key={k.l} className="kpi-card" style={{ borderColor:`${k.c}22`, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:14, right:14, fontSize:20, opacity:.6 }}>{k.icon}</div>
            <span className="kpi-label">{k.l}</span>
            <span className="kpi-val" style={{ color:k.c, fontSize:26 }}>
              {typeof k.v === "number" ? k.v.toLocaleString() : k.v}
            </span>
            <span className="kpi-sub">{k.sub}</span>
          </div>
        ))}
      </div>

      {/* Chart */}
      <div className="ap-card" style={{ marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <p style={{ fontSize:13, fontWeight:700, color:"#93C5FD" }}>Actividad — últimos {period} días</p>
          <span style={{ fontSize:11, color:"#64748B" }}>{periodLeads.length} leads en el período</span>
        </div>
        <div style={{ display:"flex", gap:4, alignItems:"flex-end", height:100 }}>
          {chartDays.map(d => (
            <div key={d.date} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, minWidth:0 }}>
              <span style={{ fontSize:8, color:d.count>0?"#60A5FA":"transparent", fontFamily:"'DM Mono',monospace" }}>{d.count}</span>
              <div style={{ width:"100%", borderRadius:"3px 3px 0 0", background:d.count>0?"linear-gradient(180deg,#3B82F6,#1D4ED8)":"rgba(255,255,255,.05)", height:`${Math.max(4,(d.count/maxC)*78)}px`, transition:"height .3s" }} />
              <span style={{ fontSize:8, color:"#334155", whiteSpace:"nowrap", overflow:"hidden", maxWidth:"100%" }}>{d.date}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Module breakdown */}
      <div className="grid-4">
        {mods.map(m => {
          const total   = leads.filter(l => m.types.some(t=>l.type===t)).length;
          const periodN = periodLeads.filter(l => m.types.some(t=>l.type===t)).length;
          const pct     = total > 0 ? Math.round(periodN/total*100) : 0;
          return (
            <div key={m.k} className="ap-card" style={{ padding:"16px 14px", borderColor:`${m.c}18` }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                <span style={{ fontSize:20 }}>{m.icon}</span>
                <span style={{ fontSize:10, color:m.c, fontWeight:700, background:`${m.c}14`, padding:"2px 7px", borderRadius:50 }}>{pct}% del total</span>
              </div>
              <p style={{ fontSize:12, fontWeight:700, color:"#94A3B8", marginBottom:4 }}>{m.label}</p>
              <p style={{ fontSize:22, fontWeight:800, color:m.c, fontFamily:"'DM Mono',monospace" }}>{periodN}</p>
              <p style={{ fontSize:10, color:"#475569", marginTop:2 }}>en {period}d · {total} total</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── LEADS (v2) ────────────────────────────────────────────────
function AdminLeads() {
  const { tc } = React.useContext(AppCtx);
  const [leads,  setLeads]  = React.useState(() => loadLeads());
  const [filter, setFilter] = React.useState("all");
  const [status, setStatus] = React.useState("all");
  const [search, setSearch] = React.useState("");
  const [expanded, setExpanded] = React.useState(null);

  React.useEffect(() => {
    const fn = () => setLeads(loadLeads());
    window.addEventListener("apLeadsUpdated", fn);
    return () => window.removeEventListener("apLeadsUpdated", fn);
  }, []);

  const updateStatus = (id, s) => {
    const u = leads.map(l => l.id === id ? { ...l, status:s } : l);
    saveLeads(u); setLeads(u);
  };

  const TYPE_META = {
    comprar_quote:      { label:"🚗 Tasación",   mod:"comprar"  },
    comprar_whatsapp:   { label:"🚗 WA",         mod:"comprar"  },
    credito_quote:      { label:"💳 Crédito",    mod:"credito"  },
    credito_whatsapp:   { label:"💳 WA",         mod:"credito"  },
    consigna_quote:     { label:"📋 Consigna",   mod:"consigna" },
    consigna_whatsapp:  { label:"📋 WA",         mod:"consigna" },
    consigna_upload_start:{ label:"📷 Fotos",    mod:"consigna" },
    showroom_interest:  { label:"🏪 Showroom",   mod:"showroom" },
  };

  const STATUS_META = {
    new:       { l:"Nuevo",      c:"#3B82F6" },
    contacted: { l:"Contactado", c:"#F59E0B" },
    closed:    { l:"Cerrado",    c:"#10B981" },
    lost:      { l:"Perdido",    c:"#EF4444" },
  };

  const filtered = leads.filter(l => {
    if (filter !== "all" && TYPE_META[l.type]?.mod !== filter) return false;
    if (status !== "all" && l.status !== status) return false;
    if (search && !JSON.stringify(l).toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ paddingTop:24 }}>
      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:10 }}>
        <div>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>📥 Leads</h3>
          <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{filtered.length} de {leads.length}</p>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <input className="ap-input" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Buscar…" style={{ width:160, fontSize:13 }} />
          <select className="ap-input" value={filter} onChange={e=>setFilter(e.target.value)} style={{ width:140 }}>
            <option value="all">Todos</option>
            <option value="comprar">🚗 Compramos</option>
            <option value="credito">💳 Créditos</option>
            <option value="consigna">📋 Consigna</option>
            <option value="showroom">🏪 Showroom</option>
          </select>
          <select className="ap-input" value={status} onChange={e=>setStatus(e.target.value)} style={{ width:140 }}>
            <option value="all">Todos los estados</option>
            <option value="new">🔵 Nuevo</option>
            <option value="contacted">🟡 Contactado</option>
            <option value="closed">🟢 Cerrado</option>
            <option value="lost">🔴 Perdido</option>
          </select>
          {leads.length > 0 && (
            <button className="ap-btn ap-btn-sm ap-btn-danger" type="button"
              onClick={() => { if (window.confirm("¿Limpiar todos los leads?")) { saveLeads([]); setLeads([]); } }}>
              🗑️
            </button>
          )}
        </div>
      </div>

      <div className="ap-card" style={{ padding:0, overflow:"hidden" }}>
        <div className="ap-scroll">
          <table className="ap-table">
            <thead>
              <tr><th>#</th><th>Tipo</th><th>Vehículo</th><th>Contacto</th><th>Valores</th><th>Fecha</th><th>Estado</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan={8} style={{ textAlign:"center", padding:"40px", color:"#475569" }}>
                  {leads.length === 0 ? "Sin leads aún — llegarán cuando los usuarios interactúen" : "Sin resultados para el filtro"}
                </td></tr>
              ) : filtered.map((l, idx) => {
                const p    = l.payload || {};
                const meta = TYPE_META[l.type] || { label:l.type, mod:"" };
                const sm   = STATUS_META[l.status] || STATUS_META.new;
                const isExp= expanded === l.id;
                return (
                  <React.Fragment key={l.id}>
                    <tr style={{ cursor:"pointer" }} onClick={() => setExpanded(isExp ? null : l.id)}>
                      <td style={{ fontSize:10, color:"#475569", fontFamily:"'DM Mono',monospace" }}>#{filtered.length - idx}</td>
                      <td><span style={{ fontSize:12, fontWeight:700, color:"#93C5FD" }}>{meta.label}</span></td>
                      <td>
                        <span style={{ fontWeight:700, color:"#F1F5F9", fontSize:12 }}>{p.brand} {p.model}</span>
                        <br /><span style={{ color:"#64748B", fontSize:10 }}>{p.year} {p.version}</span>
                      </td>
                      <td>
                        {p.firstName && <span style={{ display:"block", fontWeight:600, color:"#E2E8F0", fontSize:12 }}>{p.firstName} {p.lastName}</span>}
                        {p.phone     && <span style={{ display:"block", color:"#64748B", fontSize:10 }}>+51{p.phone}</span>}
                      </td>
                      <td style={{ fontSize:11 }}>
                        {p.valuedAt    && <span style={{ display:"block", color:"#60A5FA" }}>Val: ${(p.valuedAt||0).toLocaleString()}</span>}
                        {p.offer       && <span style={{ display:"block", color:"#10B981" }}>Oferta: ${(p.offer||0).toLocaleString()}</span>}
                        {p.amountSoles && <span style={{ display:"block", color:"#A78BFA" }}>Prést.: ${Math.round((p.amountSoles||0)/(tc||3.77)).toLocaleString()}</span>}
                        {p.selectedPriceSoles && <span style={{ display:"block", color:"#F59E0B" }}>Consigna: ${Math.round((p.selectedPriceSoles||0)/(tc||3.77)).toLocaleString()}</span>}
                      </td>
                      <td style={{ fontSize:10, color:"#64748B", whiteSpace:"nowrap" }}>
                        {new Date(l.createdAt).toLocaleDateString("es-PE",{day:"2-digit",month:"short"})}
                        <br />{new Date(l.createdAt).toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"})}
                      </td>
                      <td>
                        <select value={l.status} onChange={e => { e.stopPropagation(); updateStatus(l.id, e.target.value); }}
                          style={{ background:"rgba(255,255,255,.06)", border:`1px solid ${sm.c}44`, borderRadius:8, padding:"4px 8px", color:sm.c, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700 }}>
                          <option value="new">🔵 Nuevo</option>
                          <option value="contacted">🟡 Contactado</option>
                          <option value="closed">🟢 Cerrado</option>
                          <option value="lost">🔴 Perdido</option>
                        </select>
                      </td>
                      <td style={{ fontSize:11, color:"#64748B" }}>{isExp ? "▲" : "▼"}</td>
                    </tr>
                    {isExp && (
                      <tr>
                        <td colSpan={8} style={{ padding:"0 0 0 40px" }}>
                          <div style={{ background:"rgba(255,255,255,.03)", borderRadius:10, padding:"12px 14px", margin:"0 12px 8px", fontSize:11, color:"#64748B" }}>
                            <p style={{ marginBottom:6, color:"#93C5FD", fontWeight:700 }}>Detalle completo · ID: {l.id}</p>
                            <div className="grid-2">
                              {Object.entries(p).filter(([,v])=>v!==undefined&&v!==null&&v!=="").map(([k,v])=>(
                                <p key={k}><span style={{ color:"#475569", fontWeight:700 }}>{k}: </span>
                                  <span style={{ color:"#CBD5E1" }}>{typeof v === "object" ? JSON.stringify(v) : String(v)}</span>
                                </p>
                              ))}
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── CREDITS (v2) ──────────────────────────────────────────────
function AdminCredits() {
  const { tc } = React.useContext(AppCtx);
  const [rows, setRows] = React.useState(() =>
    loadLeads().filter(l => l.type === "credito_quote")
      .map(l => ({ ...l, creditStatus:l.creditStatus||"eval", riskLevel:l.riskLevel||"normal" }))
  );

  React.useEffect(() => {
    const fn = () => setRows(loadLeads().filter(l=>l.type==="credito_quote").map(l=>({...l,creditStatus:l.creditStatus||"eval",riskLevel:l.riskLevel||"normal"})));
    window.addEventListener("apLeadsUpdated", fn);
    return () => window.removeEventListener("apLeadsUpdated", fn);
  }, []);

  const update = (id, field, val) => {
    const all = loadLeads().map(l => l.id === id ? { ...l, [field]:val } : l);
    saveLeads(all);
    setRows(all.filter(l=>l.type==="credito_quote").map(l=>({...l,creditStatus:l.creditStatus||"eval",riskLevel:l.riskLevel||"normal"})));
  };

  const tcVal = tc || 3.77;
  const activeAmt  = rows.filter(r=>r.creditStatus==="active").reduce((s,r)=>s+(r.payload?.amountSoles||0),0);
  const evalAmt    = rows.filter(r=>r.creditStatus==="eval").reduce((s,r)=>s+(r.payload?.amountSoles||0),0);

  const kpis = [
    { l:"Cartera activa",  v:`$${Math.round(activeAmt/tcVal/1000)}k`, c:"#10B981", sub:`${rows.filter(r=>r.creditStatus==="active").length} préstamos` },
    { l:"En evaluación",   v:rows.filter(r=>r.creditStatus==="eval").length,    c:"#F59E0B", sub:`$${Math.round(evalAmt/tcVal/1000)}k solicitado` },
    { l:"Cerrados",        v:rows.filter(r=>r.creditStatus==="closed").length,   c:"#64748B", sub:"Cancelados/pagados" },
    { l:"Riesgo alto",     v:rows.filter(r=>r.riskLevel==="high").length,        c:"#EF4444", sub:"Requieren seguimiento" },
  ];

  const RISK_COL = { low:"#10B981", normal:"#F59E0B", high:"#EF4444" };
  const CRED_COL = { eval:"#F59E0B", active:"#10B981", risk:"#EF4444", closed:"#64748B" };

  return (
    <div style={{ paddingTop:24 }}>
      <div style={{ marginBottom:18 }}>
        <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>💳 Cartera de créditos</h3>
        <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{rows.length} solicitudes en total</p>
      </div>

      <div className="grid-4" style={{ marginBottom:20 }}>
        {kpis.map(k => (
          <div key={k.l} className="kpi-card" style={{ borderColor:`${k.c}22` }}>
            <span className="kpi-label">{k.l}</span>
            <span className="kpi-val" style={{ color:k.c, fontSize:20 }}>
              {typeof k.v === "number" ? k.v : k.v}
            </span>
            <span className="kpi-sub">{k.sub}</span>
          </div>
        ))}
      </div>

      <div className="ap-card" style={{ padding:0, overflow:"hidden" }}>
        <div className="ap-scroll">
          <table className="ap-table">
            <thead>
              <tr><th>Solicitante</th><th>Vehículo</th><th>Monto (S/)</th><th>Cuota/Plazo</th><th>Estado</th><th>Riesgo</th></tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan={6} style={{ textAlign:"center", padding:"40px", color:"#475569" }}>
                  Las solicitudes aparecen aquí cuando usuarios completan el formulario de crédito.
                </td></tr>
              ) : rows.map(r => {
                const p = r.payload || {};
                return (
                  <tr key={r.id}>
                    <td>
                      <p style={{ fontWeight:700, color:"#F1F5F9", fontSize:12 }}>{p.firstName||"—"} {p.lastName||""}</p>
                      <p style={{ fontSize:10, color:"#64748B" }}>+51{p.phone||""} · {p.docType?.toUpperCase()} {p.docNum}</p>
                    </td>
                    <td style={{ fontSize:12 }}>
                      <span style={{ fontWeight:600, color:"#E2E8F0" }}>{p.brand} {p.model}</span>
                      <br /><span style={{ color:"#64748B", fontSize:10 }}>{p.year} · {(p.km||0).toLocaleString()}km</span>
                    </td>
                    <td>
                      <span style={{ fontFamily:"'DM Mono',monospace", color:"#A78BFA", fontWeight:800, fontSize:13 }}>
                        ${Math.round((p.amountSoles||0)/tcVal).toLocaleString()}
                      </span>
                      <br /><span style={{ fontSize:10, color:"#64748B" }}>S/ {(p.amountSoles||0).toLocaleString()}</span>
                    </td>
                    <td style={{ fontSize:11, color:"#94A3B8" }}>
                      S/ {(p.monthlyPaymentSoles||0).toLocaleString()}/mes
                      <br />{p.term}m
                    </td>
                    <td>
                      <select value={r.creditStatus} onChange={e=>update(r.id,"creditStatus",e.target.value)}
                        style={{ background:"rgba(255,255,255,.06)", border:`1px solid ${CRED_COL[r.creditStatus]}44`, borderRadius:8, padding:"3px 7px", color:CRED_COL[r.creditStatus], fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700 }}>
                        <option value="eval">⏳ Evaluación</option>
                        <option value="active">✅ Activo</option>
                        <option value="risk">⚠️ Seguimiento</option>
                        <option value="closed">🔒 Cerrado</option>
                      </select>
                    </td>
                    <td>
                      <select value={r.riskLevel} onChange={e=>update(r.id,"riskLevel",e.target.value)}
                        style={{ background:"rgba(255,255,255,.06)", border:`1px solid ${RISK_COL[r.riskLevel]}44`, borderRadius:8, padding:"3px 7px", color:RISK_COL[r.riskLevel], fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700 }}>
                        <option value="low">🟢 Bajo</option>
                        <option value="normal">🟡 Normal</option>
                        <option value="high">🔴 Alto</option>
                      </select>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── SHOWROOM ADMIN (v2) ───────────────────────────────────────
const EMPTY_CAR = { brand:"", model:"", version:"", year:"", km:"", transmission:"", fuel:"", condition:"", color:"", price:"", photos:"", active:true, featured:false };

function AdminShowroom() {
  const { tc } = React.useContext(AppCtx);
  const [inv,     setInv]     = React.useState(() => loadInventory());
  const [editing, setEditing] = React.useState(null);
  const [form,    setForm]    = React.useState(EMPTY_CAR);

  const save = () => {
    const item = { ...form, id: editing==="new"?`i-${Date.now()}`:editing.id, year:parseInt(form.year), km:parseInt(form.km), price:parseFloat(form.price),
      photos: typeof form.photos==="string" ? form.photos.split("\n").map(s=>s.trim()).filter(Boolean) : (form.photos||[]) };
    const next = editing==="new" ? [item,...inv] : inv.map(c=>c.id===item.id?item:c);
    saveInventory(next); setInv(next);
    window.dispatchEvent(new CustomEvent("apInventoryUpdated"));
    setEditing(null);
  };

  const del = id => {
    if (!window.confirm("¿Eliminar del inventario?")) return;
    const next = inv.filter(c=>c.id!==id);
    saveInventory(next); setInv(next);
    window.dispatchEvent(new CustomEvent("apInventoryUpdated"));
  };

  const toggleActive = id => {
    const next = inv.map(c=>c.id===id?{...c,active:!c.active}:c);
    saveInventory(next); setInv(next);
    window.dispatchEvent(new CustomEvent("apInventoryUpdated"));
  };

  const startEdit = car => {
    setForm({...car, photos:Array.isArray(car.photos)?car.photos.join("\n"):(car.photos||"")});
    setEditing(car);
  };

  const brands   = Object.keys(VDB).sort();
  const models   = form.brand ? Object.keys(VDB[form.brand]||{}).sort() : [];
  const versions = (form.brand && form.model) ? (TRIMS[form.brand]?.[form.model]||["Base","Intermedia","Full"]) : [];
  const fset     = (k,v) => setForm(f=>({...f,[k]:v,...(k==="brand"?{model:"",version:""}:{}),...(k==="model"?{version:""}:{})}));
  const tcVal    = tc || 3.77;

  if (editing !== null) {
    return (
      <div style={{ paddingTop:24 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <button className="ap-btn ap-btn-secondary ap-btn-sm" type="button" onClick={() => setEditing(null)}>← Volver</button>
          <h3 style={{ fontSize:18, fontWeight:800, color:"#F1F5F9" }}>{editing==="new"?"Nuevo vehículo":"Editar vehículo"}</h3>
        </div>
        <div className="ap-card">
          <div className="grid-2" style={{ marginBottom:16 }}>
            {[
              ["brand","Marca",       <select className="ap-input" value={form.brand} onChange={e=>fset("brand",e.target.value)}><option value="">—</option>{brands.map(b=><option key={b}>{b}</option>)}</select>],
              ["model","Modelo",      <select className="ap-input" value={form.model} onChange={e=>fset("model",e.target.value)} disabled={!form.brand}><option value="">—</option>{models.map(m=><option key={m}>{m}</option>)}</select>],
              ["version","Versión",   <select className="ap-input" value={form.version} onChange={e=>fset("version",e.target.value)} disabled={!form.model}><option value="">—</option>{versions.map(v=><option key={v}>{v}</option>)}</select>],
              ["year","Año",          <input className="ap-input" type="number" value={form.year} onChange={e=>fset("year",e.target.value)} placeholder="2021" />],
              ["km","Kilometraje",    <input className="ap-input" type="number" value={form.km}   onChange={e=>fset("km",e.target.value)}   placeholder="50000" />],
              ["price","Precio (USD)",<input className="ap-input" type="number" value={form.price} onChange={e=>fset("price",e.target.value)} placeholder="25000" />],
              ["color","Color",       <input className="ap-input" value={form.color} onChange={e=>fset("color",e.target.value)} placeholder="Blanco Perla" />],
              ["transmission","Transmisión", <select className="ap-input" value={form.transmission} onChange={e=>fset("transmission",e.target.value)}><option value="">—</option><option value="automatica">Automática</option><option value="manual">Manual</option></select>],
              ["fuel","Combustible",  <select className="ap-input" value={form.fuel} onChange={e=>fset("fuel",e.target.value)}><option value="">—</option><option value="gasolina">Gasolina</option><option value="diesel">Diesel</option><option value="hibrido">Híbrido</option><option value="electrico">Eléctrico</option></select>],
              ["condition","Condición",<select className="ap-input" value={form.condition} onChange={e=>fset("condition",e.target.value)}><option value="">—</option><option value="excelente">Excelente</option><option value="bueno">Bueno</option><option value="regular">Regular</option><option value="malo">Malo</option></select>],
            ].map(([k,lbl,el])=>(
              <div key={k}><label className="ap-label">{lbl}</label>{el}</div>
            ))}
          </div>
          {form.price > 0 && (
            <div style={{ padding:"8px 12px", background:"rgba(96,165,250,.07)", border:"1px solid rgba(96,165,250,.15)", borderRadius:10, marginBottom:14, fontSize:12, color:"#93C5FD" }}>
              Equivalente: <b style={{ fontFamily:"'DM Mono',monospace" }}>S/ {Math.round(parseFloat(form.price)*tcVal).toLocaleString()}</b>
            </div>
          )}
          <div style={{ marginBottom:16 }}>
            <label className="ap-label">Fotos (URLs, una por línea)</label>
            <textarea className="ap-input" rows={4} value={form.photos}
              onChange={e=>fset("photos",e.target.value)}
              placeholder={"https://images.unsplash.com/photo-…\nhttps://…"}
              style={{ resize:"vertical" }} />
          </div>
          <div style={{ display:"flex", gap:24, marginBottom:20 }}>
            <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13, fontWeight:700, color:"#CBD5E1" }}>
              <input type="checkbox" checked={!!form.active} onChange={e=>fset("active",e.target.checked)} style={{ accentColor:"#3B82F6" }} />
              Activo (visible en showroom)
            </label>
            <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13, fontWeight:700, color:"#CBD5E1" }}>
              <input type="checkbox" checked={!!form.featured} onChange={e=>fset("featured",e.target.checked)} style={{ accentColor:"#F59E0B" }} />
              ⭐ Destacado
            </label>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button className="ap-btn ap-btn-primary" type="button" onClick={save} style={{ flex:1 }}>
              {editing==="new" ? "➕ Agregar al inventario" : "💾 Guardar cambios"}
            </button>
            <button className="ap-btn ap-btn-secondary" type="button" onClick={() => setEditing(null)}>Cancelar</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ paddingTop:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:10 }}>
        <div>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>🏪 Inventario Showroom</h3>
          <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{inv.length} vehículos · {inv.filter(c=>c.active).length} activos · {inv.filter(c=>c.featured).length} destacados</p>
        </div>
        <button className="ap-btn ap-btn-primary ap-btn-sm" type="button"
          onClick={() => { setForm(EMPTY_CAR); setEditing("new"); }}>
          ➕ Agregar vehículo
        </button>
      </div>

      <div className="ap-card" style={{ padding:0, overflow:"hidden" }}>
        <div className="ap-scroll">
          <table className="ap-table">
            <thead><tr><th>Foto</th><th>Vehículo</th><th>Precio</th><th>Km</th><th>Visible</th><th>Acciones</th></tr></thead>
            <tbody>
              {inv.length === 0 ? (
                <tr><td colSpan={6} style={{ textAlign:"center", padding:"40px", color:"#475569" }}>Sin vehículos. Agrega el primero.</td></tr>
              ) : inv.map(c => (
                <tr key={c.id} style={{ opacity: c.active ? 1 : 0.5 }}>
                  <td>
                    <img src={c.photos?.[0]||"https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=100&q=60"} alt=""
                      style={{ width:64, height:44, objectFit:"cover", borderRadius:8, border:"1px solid rgba(255,255,255,.1)" }} />
                  </td>
                  <td>
                    <p style={{ fontWeight:700, color:"#F1F5F9", fontSize:12 }}>{c.brand} {c.model} {c.featured?"⭐":""}</p>
                    <p style={{ fontSize:10, color:"#64748B" }}>{c.version} · {c.year} · {c.color||""}</p>
                  </td>
                  <td>
                    <p style={{ fontFamily:"'DM Mono',monospace", color:"#60A5FA", fontWeight:700 }}>${(c.price||0).toLocaleString()}</p>
                    <p style={{ fontSize:10, color:"#475569" }}>S/ {Math.round((c.price||0)*tcVal).toLocaleString()}</p>
                  </td>
                  <td style={{ fontSize:11, color:"#94A3B8" }}>{(c.km||0).toLocaleString()} km<br />{c.transmission==="automatica"?"AT":"MT"}</td>
                  <td>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div className={`toggle${c.active?" on":""}`} onClick={() => toggleActive(c.id)}>
                        <div className="toggle-thumb" />
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{ display:"flex", gap:6 }}>
                      <button className="ap-btn ap-btn-sm ap-btn-secondary" type="button" onClick={() => startEdit(c)}>✏️</button>
                      <button className="ap-btn ap-btn-sm ap-btn-danger"    type="button" onClick={() => del(c.id)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── CONFIG (v2) ───────────────────────────────────────────────
function AdminConfig() {
  const { cfg:ctxCfg, setCfg } = React.useContext(AppCtx);
  const [cfg,  setCfgLocal]    = React.useState(() => loadConfig());
  const [saved, setSaved]      = React.useState(false);
  const [tab,   setTab]        = React.useState("general");

  const save = () => {
    saveConfig(cfg); setCfg(cfg);
    window.dispatchEvent(new CustomEvent("apConfigUpdated", { detail:cfg }));
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const set = (path, val) => {
    const keys = path.split(".");
    setCfgLocal(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      let cur = next;
      for (let i = 0; i < keys.length-1; i++) cur = cur[keys[i]];
      cur[keys[keys.length-1]] = val;
      return next;
    });
  };

  const Inp = ({ path, label, type="text", placeholder="" }) => (
    <div>
      <label className="ap-label">{label}</label>
      <input className="ap-input" type={type}
        value={path.split(".").reduce((o,k)=>o?.[k],cfg)??""} placeholder={placeholder}
        onChange={e=>set(path, type==="number"?parseFloat(e.target.value):e.target.value)} />
    </div>
  );

  const Tog = ({ path, label, sub="" }) => {
    const val = path.split(".").reduce((o,k)=>o?.[k],cfg);
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,.05)" }}>
        <div><span style={{ fontSize:13, color:"#CBD5E1", fontWeight:600 }}>{label}</span>
          {sub && <p style={{ fontSize:10, color:"#475569", marginTop:2 }}>{sub}</p>}</div>
        <div className={`toggle${val?" on":""}`} onClick={() => set(path, !val)} style={{ flexShrink:0, marginLeft:16 }}>
          <div className="toggle-thumb" />
        </div>
      </div>
    );
  };

  const TABS = [
    { id:"general",  label:"🌐 General"  },
    { id:"modules",  label:"📦 Módulos"  },
    { id:"comprar",  label:"🚗 Compramos"},
    { id:"credito",  label:"💳 Crédito"  },
    { id:"consigna", label:"📋 Consigna" },
    { id:"showroom", label:"🏪 Showroom" },
    { id:"integ",    label:"🔌 Integ."   },
  ];

  return (
    <div style={{ paddingTop:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:10 }}>
        <div>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>⚙️ Configuración</h3>
          <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>Parámetros globales del sistema</p>
        </div>
        <button className="ap-btn ap-btn-primary ap-btn-sm" type="button" onClick={save}>
          {saved ? "✅ Guardado" : "💾 Guardar cambios"}
        </button>
      </div>

      <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:20 }}>
        {TABS.map(t => (
          <button key={t.id} type="button" onClick={() => setTab(t.id)}
            style={{ padding:"7px 14px", borderRadius:50, border:`1px solid ${tab===t.id?"#3B82F6":"rgba(255,255,255,.1)"}`, background:tab===t.id?"rgba(37,99,235,.35)":"rgba(255,255,255,.04)", color:tab===t.id?"#fff":"rgba(255,255,255,.6)", cursor:"pointer", fontWeight:700, fontSize:12, fontFamily:"inherit" }}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="ap-card">
        {tab==="general" && (
          <div style={{ display:"grid", gap:14 }}>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:4 }}>Configuración general</h4>
            <Inp path="general.whatsappNumber" label="WhatsApp (sin +)" placeholder="51988886970" />
            <div>
              <label className="ap-label">TC Fallback (solo si falla la API)</label>
              <input className="ap-input" type="number" step="0.001"
                value={cfg.general?.tcFallback||3.77}
                onChange={e=>set("general.tcFallback",parseFloat(e.target.value))} />
              <p style={{ fontSize:10, color:"#475569", marginTop:4 }}>
                El TC se obtiene automáticamente de open.er-api.com (se cachea 3h). Este valor es el fallback si la API no responde.
              </p>
            </div>
            <Inp path="general.termsUrl"  label="URL Términos & Condiciones" />
            <Inp path="general.privacyUrl" label="URL Política de Privacidad" />
          </div>
        )}

        {tab==="modules" && (
          <div>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:12 }}>Módulos públicos activos</h4>
            <Tog path="modules.comprar"  label="🚗 Compramos tu auto"         sub="Módulo de tasación y pre-oferta" />

                        <span style={{ color:"#334155" }}> → valor real de mercado ({(mh*100).toFixed(0)}% haircut): </span>
                        <b style={{ color:"#F59E0B" }}>${txV.toLocaleString()}</b>
                      </p>
                    </div>
                    {["japanese","korean","american","chinese","european"].map(o => {
                      const isPrem = o === "european";
                      const d = isPrem ? cfg.comprar?.discountByGroup?.premium : cfg.comprar?.discountByGroup?.standard;
                      const offer = Math.round(txV * (1 - (d||0)) / 500) * 500;
                      const totalDisc = ((1 - offer/20000)*100).toFixed(1);
                      return (
                        <p key={o} style={{ color:"#94A3B8", marginBottom:3 }}>
                          <span style={{ color:"#93C5FD", textTransform:"capitalize", minWidth:80, display:"inline-block" }}>{o}</span>
                          <span style={{ color:"#475569" }}> desc. AutoPago {((d||0)*100).toFixed(0)}%</span>
                          {" → "}
                          <b style={{ color:"#10B981" }}>${offer.toLocaleString()}</b>
                          <span style={{ color:"#475569", fontSize:10 }}> ({totalDisc}% total vs tasación)</span>
                        </p>
                      );
                    })}
                  </>
                );
              })()}
            </div>
          </div>
        )}

        {tab==="credito" && (
          <div style={{ display:"grid", gap:16 }}>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:4 }}>AutoCrédito</h4>
            {[6,12].map(t => (
              <div key={t} style={{ padding:"16px", background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,255,255,.07)", borderRadius:14 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                  <p style={{ fontSize:13, fontWeight:700, color:"#F1F5F9" }}>Plazo {t} meses</p>
                  <div className={`toggle${cfg.credito?.terms?.[t]?.enabled?" on":""}`}
                    onClick={()=>set(`credito.terms.${t}.enabled`,!cfg.credito?.terms?.[t]?.enabled)}>
                    <div className="toggle-thumb" />
                  </div>
                </div>
                <div className="grid-2">
                  <Inp path={`credito.terms.${t}.monthlyRate`}               label="Tasa mensual (decimal)"   type="number" />
                  <Inp path={`credito.terms.${t}.disbursementCommissionPct`}  label="Comisión desembolso (dec)" type="number" />
                </div>
              </div>
            ))}
            <div style={{ padding:"14px", background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,255,255,.07)", borderRadius:14 }}>
              <p style={{ fontSize:13, fontWeight:700, color:"#F1F5F9", marginBottom:12 }}>Elegibilidad</p>
              <div className="grid-2">
                <Inp path="credito.eligibility.premium.maxAge" label="Edad máx. premium (años)"   type="number" />
                <Inp path="credito.eligibility.premium.maxLTV" label="LTV máx. premium (decimal)" type="number" />
                <Inp path="credito.eligibility.other.maxAge"   label="Edad máx. estándar (años)"  type="number" />
                <Inp path="credito.eligibility.other.maxLTV"   label="LTV máx. estándar (decimal)"type="number" />
              </div>
            </div>
            <Inp path="credito.conservativePct" label="Haircut conservador (decimal)" type="number" />
          </div>
        )}

        {tab==="consigna" && (
          <div style={{ display:"grid", gap:14 }}>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:4 }}>AutoConsigna</h4>
            <div className="grid-2">
              <Inp path="consigna.commissionPct"    label="Comisión % (decimal)"       type="number" />
              <Inp path="consigna.rangeMinFactor"   label="Factor mínimo (ej. 0.70)"   type="number" />
              <Inp path="consigna.rangeMaxFactor"   label="Factor máximo (ej. 1.15)"   type="number" />
              <Inp path="consigna.baseDays"         label="Días al precio óptimo"      type="number" />
              <Inp path="consigna.speedExponent"    label="Exponente curva días"       type="number" />
            </div>
          </div>
        )}

        {tab==="showroom" && (
          <div style={{ display:"grid", gap:14 }}>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:4 }}>Showroom</h4>
            <div>
              <label className="ap-label">Plantilla WhatsApp de interés</label>
              <textarea className="ap-input" rows={3} value={cfg.showroom?.waTemplate||""}
                onChange={e=>set("showroom.waTemplate",e.target.value)} style={{ resize:"vertical" }} />
              <p style={{ fontSize:10, color:"#475569", marginTop:4 }}>Variables: {"{brand} {model} {version} {year} {price_soles} {price_usd}"}</p>
            </div>
          </div>
        )}

        {tab==="integ" && (
          <div style={{ display:"grid", gap:14 }}>
            <h4 style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:4 }}>Integraciones externas</h4>
            <div className="grid-2">
              <Inp path="integrations.metaPixelId"        label="Meta Pixel ID"        />
              <Inp path="integrations.googleAnalyticsId"  label="Google Analytics ID"  />
              <Inp path="integrations.googleTagManagerId" label="Google Tag Manager ID" />
              <Inp path="integrations.tiktokPixelId"      label="TikTok Pixel ID"      />
              <Inp path="integrations.hotjarId"           label="Hotjar Site ID"       />
            </div>
            <Inp path="integrations.crmWebhookUrl" label="CRM Webhook URL" placeholder="https://hook.make.com/…" />
            <div style={{ padding:"12px", background:"rgba(59,130,246,.06)", border:"1px solid rgba(59,130,246,.15)", borderRadius:12, fontSize:11, color:"#64748B", lineHeight:1.7 }}>
              Los IDs se inyectan en el HTML de producción. El webhook envía cada lead nuevo a Make/Zapier/n8n en formato JSON.
            </div>
          </div>
        )}
      </div>

      <div style={{ marginTop:14, textAlign:"right" }}>
        <button className="ap-btn ap-btn-primary" type="button" onClick={save}>
          {saved ? "✅ Guardado" : "💾 Guardar todos los cambios"}
        </button>
      </div>
    </div>
  );
}

// ─── USERS (v2) ────────────────────────────────────────────────
function AdminUsers({ session }) {
  const [users,  setUsers]  = React.useState(() => loadUsers());
  const [adding, setAdding] = React.useState(false);
  const [form,   setForm]   = React.useState({ email:"", password:"", role:"analyst" });
  const fset = (k,v) => setForm(f=>({...f,[k]:v}));

  const addUser = () => {
    if (!form.email || !form.password) return;
    const next = [...users, { id:`u-${Date.now()}`, ...form, isActive:true }];
    saveUsers(next); setUsers(next);
    setForm({ email:"", password:"", role:"analyst" }); setAdding(false);
  };

  const toggle = id => { const next = users.map(u=>u.id===id?{...u,isActive:!u.isActive}:u); saveUsers(next); setUsers(next); };
  const del    = id => {
    if (id===session.userId || !window.confirm("¿Eliminar usuario?")) return;
    const next = users.filter(u=>u.id!==id); saveUsers(next); setUsers(next);
  };

  const ROLE_COLORS = { owner:"#F59E0B", admin:"#3B82F6", analyst:"#10B981", viewer:"#94A3B8" };

  return (
    <div style={{ paddingTop:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:10 }}>
        <div>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>👥 Usuarios</h3>
          <p style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{users.length} usuarios · {users.filter(u=>u.isActive).length} activos</p>
        </div>
        {session.role==="owner" && (
          <button className="ap-btn ap-btn-primary ap-btn-sm" type="button" onClick={()=>setAdding(v=>!v)}>
            {adding?"✕ Cancelar":"➕ Agregar usuario"}
          </button>
        )}
      </div>

      {adding && (
        <div className="ap-card" style={{ marginBottom:20 }}>
          <div className="grid-2" style={{ marginBottom:14 }}>
            <div><label className="ap-label">Email</label><input className="ap-input" type="email" value={form.email} onChange={e=>fset("email",e.target.value)} placeholder="nuevo@autopago.pe" /></div>
            <div><label className="ap-label">Contraseña</label><input className="ap-input" type="password" value={form.password} onChange={e=>fset("password",e.target.value)} placeholder="min. 8 chars" /></div>
            <div><label className="ap-label">Rol</label>
              <select className="ap-input" value={form.role} onChange={e=>fset("role",e.target.value)}>
                <option value="owner">Owner — acceso total</option>
                <option value="admin">Admin — sin gestión de usuarios</option>
                <option value="analyst">Analista — solo lectura</option>
                <option value="viewer">Viewer — solo dashboard</option>
              </select>
            </div>
          </div>
          <button className="ap-btn ap-btn-success ap-btn-sm" type="button" onClick={addUser} disabled={!form.email||!form.password}>✅ Crear usuario</button>
        </div>
      )}

      <div className="ap-card" style={{ padding:0, overflow:"hidden", marginBottom:20 }}>
        <div className="ap-scroll">
          <table className="ap-table">
            <thead><tr><th>Usuario</th><th>Rol</th><th>Estado</th>{session.role==="owner"&&<th>Acciones</th>}</tr></thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id}>
                  <td>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:28,height:28,borderRadius:"50%",background:`${ROLE_COLORS[u.role]}20`,border:`1px solid ${ROLE_COLORS[u.role]}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:ROLE_COLORS[u.role],flexShrink:0 }}>
                        {u.email[0].toUpperCase()}
                      </div>
                      <div>
                        <p style={{ fontSize:12,fontWeight:u.id===session.userId?700:400,color:"#F1F5F9" }}>{u.email}</p>
                        {u.id===session.userId&&<span style={{ fontSize:9,color:"#64748B" }}>← tú</span>}
                      </div>
                    </div>
                  </td>
                  <td><span style={{ fontSize:11,fontWeight:700,color:ROLE_COLORS[u.role],background:`${ROLE_COLORS[u.role]}18`,padding:"3px 10px",borderRadius:50 }}>{u.role.toUpperCase()}</span></td>
                  <td><span style={{ fontSize:11,fontWeight:700,color:u.isActive?"#10B981":"#EF4444" }}>{u.isActive?"● Activo":"● Inactivo"}</span></td>
                  {session.role==="owner" && (
                    <td>
                      {u.id!==session.userId && (
                        <div style={{ display:"flex",gap:6 }}>
                          <button className="ap-btn ap-btn-sm ap-btn-secondary" type="button" onClick={()=>toggle(u.id)} style={{ fontSize:11 }}>{u.isActive?"Desactivar":"Activar"}</button>
                          <button className="ap-btn ap-btn-sm ap-btn-danger"    type="button" onClick={()=>del(u.id)}>🗑️</button>
                        </div>
                      )}
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Permission matrix */}
      <div className="ap-card">
        <p style={{ fontSize:13, fontWeight:700, color:"#93C5FD", marginBottom:12 }}>Matriz de permisos</p>
        <div className="ap-scroll">
          <table className="ap-table">
            <thead><tr><th>Sección</th><th style={{ color:ROLE_COLORS.owner }}>Owner</th><th style={{ color:ROLE_COLORS.admin }}>Admin</th><th style={{ color:ROLE_COLORS.analyst }}>Analista</th><th style={{ color:ROLE_COLORS.viewer }}>Viewer</th></tr></thead>
            <tbody>
              {["dashboard","leads","credits","showroom","config","users"].map(s => (
                <tr key={s}>
                  <td style={{ fontWeight:700,color:"#F1F5F9",textTransform:"capitalize" }}>{s}</td>
                  {["owner","admin","analyst","viewer"].map(r => (
                    <td key={r} style={{ textAlign:"center" }}>
                      {canAccess(r,s) ? <span style={{ color:"#10B981",fontSize:16 }}>✓</span> : <span style={{ color:"#334155",fontSize:14 }}>—</span>}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
function App() {
  const [page,      setPage]      = React.useState("home");
  const [tc,        setTc]        = React.useState(null);   // null = loading
  const [tcSource,  setTcSource]  = React.useState("");
  const [cfg,       setCfg]       = React.useState(() => loadConfig());
  const [session,   setSession]   = React.useState(() => loadSession());
  const [showAdmin, setShowAdmin] = React.useState(false);

  // ── Inject global CSS ─────────────────────────────────────────
  React.useEffect(() => {
    if (document.getElementById("ap-global-css")) return;
    const el = document.createElement("style");
    el.id = "ap-global-css";
    el.textContent = GLOBAL_CSS;
    document.head.appendChild(el);
  }, []);

  // ── TC real del día (open.er-api.com, sin API key) ────────────
  React.useEffect(() => {
    const CACHE_KEY = "ap_tc_cache";
    const CACHE_TTL = 3 * 60 * 60 * 1000; // 3 horas

    const applyFallback = () => {
      const fb = cfg.general?.tcFallback || 3.77;
      setTc(fb);
      setTcSource("manual");
    };

    const loadTC = async () => {
      // Check cache first
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
        if (cached && Date.now() - cached.ts < CACHE_TTL) {
          setTc(cached.rate);
          setTcSource("cache");
          return;
        }
      } catch { /* ignore */ }

      // Fetch live rate
      try {
        const res  = await fetch("https://open.er-api.com/v6/latest/USD", { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        if (data?.rates?.PEN) {
          const rate = parseFloat(data.rates.PEN.toFixed(3));
          setTc(rate);
          setTcSource("live");
          localStorage.setItem(CACHE_KEY, JSON.stringify({ rate, ts: Date.now() }));
          return;
        }
      } catch { /* network error or API down */ }

      // Fallback
      applyFallback();
    };

    loadTC();
    const id = setInterval(loadTC, 3 * 60 * 60 * 1000); // refresh every 3h
    return () => clearInterval(id);
  }, [cfg.general?.tcFallback]);

  // ── Config live-reload ────────────────────────────────────────
  React.useEffect(() => {
    const fn = e => { if (e.detail) setCfg(e.detail); };
    window.addEventListener("apConfigUpdated", fn);
    return () => window.removeEventListener("apConfigUpdated", fn);
  }, []);

  const handleLogin  = s  => { setSession(s); };
  const handleLogout = () => { clearSession(); setSession(null); setShowAdmin(false); };
  const goAdmin      = () => setShowAdmin(true);
  const goPublic     = () => setShowAdmin(false);

  const effectiveTc = tc || cfg.general?.tcFallback || 3.77;
  const ctx = { tc: effectiveTc, tcSource, cfg, setTc, setCfg };

  // ── ADMIN ─────────────────────────────────────────────────────
  if (showAdmin) {
    if (!session) {
      return (
        <AppCtx.Provider value={ctx}>
          <AdminLogin onLogin={handleLogin} />
        </AppCtx.Provider>
      );
    }
    return (
      <AppCtx.Provider value={ctx}>
        <div style={{ position:"relative" }}>
          <button type="button" onClick={goPublic}
            style={{ position:"fixed", top:12, right:16, zIndex:9999, padding:"6px 14px", borderRadius:50, background:"rgba(37,99,235,.4)", border:"1px solid rgba(59,130,246,.5)", color:"#fff", cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"inherit" }}>
            ← Volver al sitio
          </button>
          <AdminShell session={session} onLogout={handleLogout} tcSource={tcSource} />
        </div>
      </AppCtx.Provider>
    );
  }

  // ── PUBLIC ────────────────────────────────────────────────────
  const PAGE_MAP = {
    home     : <Home onNav={setPage} />,
    comprar  : <ComprarModule onNav={setPage} />,
    credito  : <CreditoModule />,
    consigna : <ConsignaModule />,
    showroom : <ShowroomModule />,
  };
  const currentPage = cfg.modules?.[page] === false ? "home" : page;

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{ minHeight:"100vh" }}>
        <Navbar current={currentPage} onNav={p => setPage(p)} onAdmin={goAdmin} />
        <main>{PAGE_MAP[currentPage] || PAGE_MAP.home}</main>
      </div>
    </AppCtx.Provider>
  );
}




    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
