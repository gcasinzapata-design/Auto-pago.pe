// ─── STORAGE HELPERS ───────────────────────────────────────────
function _loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    return Array.isArray(fallback) ? parsed : { ...fallback, ...parsed };
  } catch { return fallback; }
}
function _saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function loadConfig() {
  const c = _loadJSON(AP_KEYS.cfg, DEFAULT_CONFIG);
  // deep-merge each sub-section so new keys always exist
  c.general    = { ...DEFAULT_CONFIG.general,    ...(c.general    || {}) };
  c.modules    = { ...DEFAULT_CONFIG.modules,    ...(c.modules    || {}) };
  c.autometro  = { ...DEFAULT_CONFIG.autometro,  ...(c.autometro  || {}) };
  c.comprar    = {
    ...DEFAULT_CONFIG.comprar, ...(c.comprar || {}),
    discountByGroup: { ...DEFAULT_CONFIG.comprar.discountByGroup, ...(c.comprar?.discountByGroup || {}) },
  };
  c.credito = {
    ...DEFAULT_CONFIG.credito, ...(c.credito || {}),
    terms: {
      6  : { ...DEFAULT_CONFIG.credito.terms[6],  ...(c.credito?.terms?.[6]  || {}) },
      12 : { ...DEFAULT_CONFIG.credito.terms[12], ...(c.credito?.terms?.[12] || {}) },
    },
    eligibility: {
      premium : { ...DEFAULT_CONFIG.credito.eligibility.premium, ...(c.credito?.eligibility?.premium || {}) },
      other   : { ...DEFAULT_CONFIG.credito.eligibility.other,   ...(c.credito?.eligibility?.other   || {}) },
    },
  };
  c.consigna     = { ...DEFAULT_CONFIG.consigna,     ...(c.consigna     || {}) };
  c.showroom     = { ...DEFAULT_CONFIG.showroom,     ...(c.showroom     || {}) };
  c.integrations = { ...DEFAULT_CONFIG.integrations, ...(c.integrations || {}) };
  return c;
}

function trackLead(type, payload) {
  const leads = loadLeads();
  const lead  = {
    id        : `L-${Date.now()}-${Math.random().toString(16).slice(2,8)}`,
    type, payload,
    createdAt : new Date().toISOString(),
    status    : "new",
  };
  leads.unshift(lead);
  saveLeads(leads);
  window.dispatchEvent(new CustomEvent("apLeadsUpdated", { detail: lead }));
  return lead;
}

// Annual depreciation rate per origin × category
// Europeans: higher rate due to maintenance cost barrier in PE market

  korean   : { sedan:0.12, suv:0.11, pickup:0.09, hatchback:0.12, minivan:0.11, van:0.11 },

  american : { sedan:0.12, suv:0.10, pickup:0.08, hatchback:0.12, minivan:0.11, van:0.11 },
  chinese  : { sedan:0.14, suv:0.13, pickup:0.12, hatchback:0.15, minivan:0.13, van:0.14 },

// Softening factor per origin (Europeans hold floor better due to prestige,
// but depreciate faster in Peru due to running costs)
const DEP_SOFTEN = { european:0.82, japanese:1.00, korean:1.00, american:1.00, chinese:1.00 };

const PREMIUM_ORIGINS = new Set(["european"]);
const isPremium = o => PREMIUM_ORIGINS.has(o);

// Residual floor by category + premium flag
function getFloor(category, prem) {
  const f = {
    pickup    : 0.42,
    suv       : prem ? 0.36 : 0.33,
    sedan     : prem ? 0.30 : 0.26,
    hatchback : prem ? 0.28 : 0.22,
    minivan   : 0.28,
    van       : 0.30,
  };
  return f[category] ?? 0.26;
}

// ─── TRIM MULTIPLIER ───────────────────────────────────────────
function trimMult(version) {
  const v = (version || "").toLowerCase();
  if (!v) return 1.00;
  // Hybrid / EV
  if (v.includes("hev") || v.includes("hybrid") || v.includes("híbr") || v.includes("ev")) return 1.07;
  // Top-of-line performance
  if (v.includes("m50") || v.includes("m40") || v.includes("raptor") || v.includes("gr sport")
   || v.includes("amg line") || v.includes("m sport pro") || v.includes("gti") || v.includes("n line")) return 1.06;
  // Full / Premium trim
  if (v.includes("full") || v.includes("lux") || v.includes("signat") || v.includes("legender")
   || v.includes("zx")   || v.includes("vx")  || v.includes("king ranch") || v.includes("touring")
   || v.includes("night") || v.includes("black edition") || v.includes("m sport")) return 1.04;
  // Mid trim
  if (v.includes("inter") || v.includes("advance") || v.includes("exclusive") || v.includes("limited")
   || v.includes("premier")|| v.includes("highline") || v.includes("gt line") || v.includes("n line")
   || v.includes("ex-l")   || v.includes("comfort")  || v.includes("pro-4x")  || v.includes("xle")) return 1.02;
  // Sport variants (not top)
  if (v.includes("sport") || v.includes("s line") || v.includes("r-line")) return 1.03;
  // Base / entry
  if (v.includes("base") || v.includes("sense") || v.includes("trendline") || v.includes("dx")
   || v.includes(" ls")  || v.includes(" l ")   || v.includes("sdrive") || v.includes(" xl ")
   || v.includes(" s ")) return 0.97;
  return 1.00;
}

// ─── MAIN VALUATE FUNCTION ─────────────────────────────────────
// Returns { value, conservativeValue, origin, category, isPremium, basePrice, conf }
// conf: "offline" always (API comparables = future integration)
function valuate(brand, model, year, km, transmission, condition = "bueno", version = "") {
  const bd = VDB[brand];       if (!bd) return null;
  const md = bd[model];        if (!md) return null;
  const { p: base, o: origin, c: category } = md;

  const age      = Math.max(0, CURRENT_YEAR - parseInt(year, 10));
  const rawDep   = (DEP[origin] || DEP.chinese)[category] ?? 0.12;
  const effDep   = Math.min(0.22, Math.max(0.04, rawDep * (DEP_SOFTEN[origin] ?? 1)));
  const floor    = getFloor(category, isPremium(origin));
  const curve    = Math.pow(1 - effDep, age);
  let val        = base * Math.max(floor, curve);

  // ── KM adjustment (capped bands, no extremes) ──────────────
  const kmInt        = parseInt(km, 10) || 0;
  const expPerYear   = category === "pickup" ? 20000 : category === "suv" ? 17000 : 15500;
  const expectedKm   = Math.max(1, age) * expPerYear;
  const kmRatio      = expectedKm > 0 ? kmInt / expectedKm : 1;
  let kmAdj = 0;
  if      (kmRatio < 0.65) kmAdj = +0.04;
  else if (kmRatio < 0.85) kmAdj = +0.02;
  else if (kmRatio < 1.15) kmAdj =  0;
  else if (kmRatio < 1.50) kmAdj = -0.05;
  else                     kmAdj = -0.09;
  val *= (1 + kmAdj);

  // ── Transmission premium ───────────────────────────────────
  if (transmission === "automatica") val *= 1.03;

  // ── Condition ──────────────────────────────────────────────
  val *= ({ excelente:1.06, bueno:1.00, regular:0.90, malo:0.78 }[condition] ?? 1.00);

  // ── Trim ───────────────────────────────────────────────────
  val *= trimMult(version);

  // ── Age-based cap (avoid over-valuing recent cars) ─────────
  const ageCap = base * (age <= 1 ? 0.95 : age <= 3 ? 0.88 : age <= 5 ? 0.80 : 0.72);
  val = Math.min(val, ageCap);
  val = Math.max(val, base * floor * 0.94);   // absolute floor
  val = Math.round(val / 500) * 500;

  // ── Conservative value for credit LTV ─────────────────────
  const conservativePct  = loadConfig().credito?.conservativePct ?? 0.10;
  const conservativeValue = Math.round(val * (1 - conservativePct) / 500) * 500;

  return { value: val, conservativeValue, origin, category, isPremium: isPremium(origin), basePrice: base, conf: "offline" };
}

// ─── CALC COMPRAR OFFER ────────────────────────────────────────
function calcOffer(vResult) {
  const cfg = loadConfig();
  const { premium, standard, europeanExtra } = cfg.comprar.discountByGroup;
  const marketHaircut = cfg.comprar.marketHaircut ?? 0.10;
  const isEuro   = vResult.origin === "european";
  const discount = vResult.isPremium ? (premium - (isEuro ? europeanExtra : 0)) : standard;
  // 1. Valor de transaccion real (lo que se negocia en la practica)
  const transactionValue = vResult.value * (1 - marketHaircut);
  // 2. Pre-oferta AutoPago sobre ese valor real
  const offer = Math.round(transactionValue * (1 - discount) / 500) * 500;
  return { offer, discount, transactionValue: Math.round(transactionValue) };
}

// ─── AMORTIZATION ──────────────────────────────────────────────
function buildAmortization(principal, monthlyRate, term) {
  const pmt = principal * (monthlyRate * Math.pow(1 + monthlyRate, term)) /
              (Math.pow(1 + monthlyRate, term) - 1);
  let balance = principal;
  return Array.from({ length: term }, (_, i) => {
    const interest = balance * monthlyRate;
    const princ    = pmt - interest;
    balance       -= princ;
    return {
      period    : i + 1,
      payment   : Math.round(pmt),
      interest  : Math.round(interest),
      principal : Math.round(princ),
      balance   : Math.max(0, Math.round(balance)),
    };
  });
}

// ─── CREDIT ELIGIBILITY ────────────────────────────────────────
function checkEligibility(brand, model, year, cfg) {
  if (!brand || !model || !year)
    return { eligible: false, reason: "Complete los datos del vehículo" };
  const md = VDB[brand]?.[model];
  if (!md) return { eligible: false, reason: "Vehículo no encontrado" };
  const origin = md.o;
  const isPrem = ["japanese","european","american"].includes(origin);
  const rules  = isPrem ? cfg.credito.eligibility.premium : cfg.credito.eligibility.other;
  const age    = CURRENT_YEAR - parseInt(year, 10);
  if (age > rules.maxAge)
    return { eligible: false, reason: `Vehículo muy antiguo (${age} años). Máx. ${rules.maxAge} años para origen ${isPrem ? "premium" : "estándar"}.` };
  return { eligible: true, maxLTV: rules.maxLTV, age, isPrem, rules, origin };
}

            {phoneOk ? "✓ Número válido" : "Debe tener 9 dígitos y comenzar con 9"}
          </p>
        )}
      </div>
    </div>
  );
}

function isContactValid(c) {
  if (!c) return false;
  const { firstName, lastName, docType, docNum, phone } = c;
  if (!firstName?.trim() || !lastName?.trim()) return false;
  if (!docType) return false;
  const docOk = docType === "dni"
    ? /^\d{8}$/.test(docNum || "")
    : /^[A-Za-z0-9]{9,12}$/.test(docNum || "");
  if (!docOk) return false;
  if (!/^9\d{8}$/.test(phone || "")) return false;
  return true;
}

// All fields start empty (no pre-filled values, only placeholders)
function VehicleForm({ onChange, showNotes = false }) {
  const EMPTY = { brand:"", model:"", version:"", year:"", km:"", transmission:"", fuel:"", condition:"", notes:"" };
  const [d, setD] = React.useState(EMPTY);

  const brands   = Object.keys(VDB).sort();
  const models   = d.brand ? Object.keys(VDB[d.brand] || {}).sort() : [];
  const versions = (d.brand && d.model) ? (TRIMS[d.brand]?.[d.model] || ["Base","Intermedia","Full"]) : [];
  const years    = Array.from({ length: CURRENT_YEAR - 2004 }, (_, i) => CURRENT_YEAR - i);

  const update = (k, v) => {
    const next = { ...d, [k]: v };
    if (k === "brand") { next.model = ""; next.version = ""; }
    if (k === "model") { next.version = ""; }
    setD(next);
    onChange(next);
  };

  // Notify parent on first render (empty state)
  React.useEffect(() => { onChange(EMPTY); }, []); // eslint-disable-line

  const Sel = ({ k, label, opts, disabled }) => (
    <div>
      <label className="ap-label">{label}</label>
      <select className="ap-input" value={d[k]} onChange={e => update(k, e.target.value)} disabled={disabled}>
        <option value="">— Seleccionar —</option>
        {opts.map(o => typeof o === "string"
          ? <option key={o} value={o}>{o}</option>
          : <option key={o.v} value={o.v}>{o.l}</option>
        )}
      </select>
    </div>
  );

  return (
    <div className="grid-2">
      <Sel k="brand"        label="Marca"         opts={brands} />
      <Sel k="model"        label="Modelo"         opts={models}   disabled={!d.brand} />
      <Sel k="version"      label="Versión / Trim" opts={versions} disabled={!d.model} />
      <Sel k="year"         label="Año"
        opts={years.map(y => ({ v: String(y), l: String(y) }))} />
      <div>
        <label className="ap-label">Kilometraje</label>
        <input className="ap-input" type="number" value={d.km}
          onChange={e => update("km", e.target.value)}
          placeholder="Ej: 65000" min="0" max="999999" />
      </div>
      <Sel k="transmission" label="Transmisión"
        opts={[{ v:"automatica", l:"Automática" }, { v:"manual", l:"Manual" }]} />
      <Sel k="fuel" label="Combustible"
        opts={[{ v:"gasolina", l:"Gasolina" }, { v:"diesel", l:"Diesel" }, { v:"hibrido", l:"Híbrido" }, { v:"electrico", l:"Eléctrico" }]} />
      <Sel k="condition" label="Condición"
        opts={[{ v:"excelente", l:"Excelente" }, { v:"bueno", l:"Bueno" }, { v:"regular", l:"Regular" }, { v:"malo", l:"Malo" }]} />

      {showNotes && (
        <div style={{ gridColumn:"span 2" }}>
          <label className="ap-label">Notas adicionales (opcional)</label>
          <textarea className="ap-input" rows={2} value={d.notes}
            onChange={e => update("notes", e.target.value)}
            placeholder="Ej: rayón leve en puerta trasera, llantas nuevas, extras…"
            style={{ resize:"vertical" }} />
        </div>
      )}
    </div>
  );
}

function isVehicleValid(d) {
  return !!(d?.brand && d?.model && d?.year && d?.km && d?.transmission && d?.fuel && d?.condition);
}

function PriceSlider({ marketUSD, commPct, userAskSoles, tc, onPriceChange }) {
  const tcVal = tc || 3.77;
  const cfg   = loadConfig().consigna;
  const mktS  = Math.round(marketUSD * tcVal / 1000) * 1000;
  const minS  = Math.round(mktS * (cfg.rangeMinFactor  || 0.70) / 1000) * 1000;
  const maxS  = Math.round(mktS * (cfg.rangeMaxFactor  || 1.15) / 1000) * 1000;
  const optS  = Math.round(mktS * (cfg.optimalFactor   || 1.00) / 1000) * 1000;
  const baseD = cfg.baseDays     || 25;
  const exp   = cfg.speedExponent|| 5;

  const [price, setPrice] = React.useState(optS);

  React.useEffect(() => {
    const clamped = userAskSoles
      ? Math.max(minS, Math.min(maxS, Math.round(userAskSoles / 1000) * 1000))
      : optS;
    setPrice(clamped);
    onPriceChange(clamped);
  }, [userAskSoles, optS]); // eslint-disable-line

  const commission = Math.round(price * commPct / 500) * 500;
  const netOwner   = price - commission;
  const days       = Math.max(3, Math.round(baseD * Math.pow(price / optS, exp)));
  const daysColor  = days <= 14 ? "#10B981" : days <= 35 ? "#F59E0B" : "#EF4444";
  const daysLabel  = days <= 14 ? "🟢 Venta rápida" : days <= 35 ? "🟡 Plazo normal" : "🔴 Venta lenta";
  const fillPct    = ((price - minS) / (maxS - minS) * 100).toFixed(1);
  const optPct     = ((optS  - minS) / (maxS - minS) * 100).toFixed(1);
  const outOfRange = userAskSoles && (userAskSoles < minS || userAskSoles > maxS);

  const handleChange = v => { setPrice(v); onPriceChange(v); };

  return (
    <div>
      {/* Reference points */}
      <div className="grid-3" style={{ marginBottom:20 }}>
        {[
          { l:"Precio mínimo", v:minS, c:"#F87171", bg:"rgba(239,68,68,.07)", bc:"rgba(239,68,68,.18)", d:`~${Math.round(baseD * Math.pow(minS/optS, exp))} días` },
          { l:"⭐ Óptimo",     v:optS, c:"#6EE7B7", bg:"rgba(16,185,129,.09)", bc:"rgba(16,185,129,.3)", d:`~${baseD} días` },
          { l:"Precio máximo", v:maxS, c:"#FCD34D", bg:"rgba(245,158,11,.07)", bc:"rgba(245,158,11,.18)", d:`~${Math.round(baseD * Math.pow(maxS/optS, exp))} días` },
        ].map(k => (
          <div key={k.l} onClick={() => handleChange(k.v)}
            style={{ background:k.bg, border:`1px solid ${k.bc}`, borderRadius:12, padding:"10px 6px", textAlign:"center", cursor:"pointer", transition:"opacity .15s" }}
            onMouseEnter={e => e.currentTarget.style.opacity = ".8"}
            onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
            <p style={{ fontSize:9, fontWeight:700, color:"#64748B", marginBottom:3 }}>{k.l.toUpperCase()}</p>
            <p style={{ fontSize:14, fontWeight:800, color:k.c, fontFamily:"'DM Mono',monospace" }}>${Math.round(k.v/tcVal).toLocaleString()}</p>
            <p style={{ fontSize:9, color:"#475569" }}>S/ {k.v.toLocaleString()}</p>
            <p style={{ fontSize:9,  color:"#64748B", marginTop:2 }}>{k.d}</p>
          </div>
        ))}
      </div>

      {outOfRange && (
        <div style={{ background:"rgba(245,158,11,.1)", border:"1px solid rgba(245,158,11,.25)", borderRadius:10, padding:"8px 12px", marginBottom:12, fontSize:11, color:"#FCD34D" }}>
          Tu precio pedido (S/ {userAskSoles?.toLocaleString()}) está fuera del rango viable. Usa el slider para ajustar.
        </div>
      )}

      {/* Slider */}
      <div style={{ position:"relative", marginTop:28, marginBottom:6 }}>
        <div style={{ position:"absolute", left:`calc(${optPct}% - 26px)`, top:-18, fontSize:9, color:"#10B981", fontWeight:700, whiteSpace:"nowrap" }}>▼ ÓPTIMO</div>
        <input type="range" className="ap-slider"
          min={minS} max={maxS} step={1000} value={price}
          onChange={e => handleChange(parseInt(e.target.value))}
          style={{ width:"100%", background:`linear-gradient(to right,#3B82F6 ${fillPct}%,rgba(255,255,255,.12) ${fillPct}%)` }} />
      </div>

      {/* Selected price */}
      <div style={{ textAlign:"center", padding:"14px 0 12px" }}>
        <p style={{ fontSize:10, color:"#64748B", fontWeight:700, marginBottom:4, letterSpacing:".06em" }}>PRECIO DE CONSIGNA SELECCIONADO</p>
        <p style={{ fontSize:34, fontWeight:800, color:"#F1F5F9", fontFamily:"'DM Mono',monospace", letterSpacing:"-1px" }}>
          ${Math.round(price / tcVal).toLocaleString()}
        </p>
        <p style={{ fontSize:12, color:"#475569", marginTop:3 }}>S/ {price.toLocaleString()}</p>
      </div>

      {/* Breakdown */}
      <div className="grid-3">
        {[
          { l:"Tiempo estimado", v:daysLabel,                          sub:`~${days} días para vender`, c:daysColor, bc:`${daysColor}22`, bg:"rgba(255,255,255,.03)" },
          { l:`Comisión (${(commPct*100).toFixed(0)}%)`,v:`−$${Math.round(commission/tcVal).toLocaleString()}`, sub:`S/ ${commission.toLocaleString()}`, c:"#F59E0B", bc:"transparent", bg:"rgba(255,255,255,.03)" },
          { l:"Tú cobras",       v:`$${Math.round(netOwner/tcVal).toLocaleString()}`,  sub:`S/ ${netOwner.toLocaleString()} neto`, c:"#10B981", bc:"rgba(16,185,129,.2)", bg:"rgba(16,185,129,.05)" },
        ].map(k => (
          <div key={k.l} style={{ background:k.bg, border:`1px solid ${k.bc}`, borderRadius:12, padding:"10px 8px", textAlign:"center" }}>
            <p style={{ fontSize:9,  color:"#64748B", fontWeight:700, marginBottom:3, letterSpacing:".05em" }}>{k.l.toUpperCase()}</p>
            <p style={{ fontSize:13, fontWeight:800, color:k.c, fontFamily:"'DM Mono',monospace" }}>{k.v}</p>
            <p style={{ fontSize:9, color:"#64748B", marginTop:2 }}>{k.sub}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function AmortChart({ schedule }) {
  if (!schedule?.length) return null;
  const W = 340, H = 110, padL = 4, padR = 4, padB = 22, padT = 8;
  const n     = schedule.length;
  const barW  = (W - padL - padR) / n - 1.5;
  const maxP  = Math.max(...schedule.map(r => r.payment));
  const maxBal= schedule[0].balance + schedule[0].principal;
  const xOf   = i => padL + i * ((W - padL - padR) / n);
  const yOf   = bal => padT + (1 - bal / maxBal) * (H - padT - padB);
  const pts   = schedule.map((r, i) => `${xOf(i) + barW / 2},${yOf(r.balance)}`).join(" ");

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", maxWidth:400, overflow:"visible" }}>
      {schedule.map((r, i) => {
        const totalH = (r.payment / maxP) * (H - padT - padB);
        const intH   = (r.interest / r.payment) * totalH;
        const priH   = totalH - intH;
        return (
          <g key={i}>
            <rect x={xOf(i)} y={H - padB - totalH} width={barW} height={priH}   fill="#3B82F6" opacity=".8" rx={1} />
            <rect x={xOf(i)} y={H - padB - intH}   width={barW} height={intH}   fill="#EF4444" opacity=".7" rx={1} />
          </g>
        );
      })}
      <polyline points={pts} fill="none" stroke="#FBBF24" strokeWidth="1.8" opacity=".9" />
      {[0, Math.floor(n / 2), n - 1].map(i => (
        <text key={i} x={xOf(i) + barW / 2} y={H - 5} textAnchor="middle" style={{ fontSize:7, fill:"#475569" }}>
          M{schedule[i].period}
        </text>
      ))}
    </svg>
  );
}

function CreditoModule() {
  const { tc, cfg } = React.useContext(AppCtx);
  const [vehicle,   setVehicle]   = React.useState(null);
  const [vResult,   setVResult]   = React.useState(null);   // valuation result
  const [term,      setTerm]      = React.useState("");
  const [amountS,   setAmountS]   = React.useState("");     // amount in SOLES (user input)
  const [result,    setResult]    = React.useState(null);
  const [schedule,  setSchedule]  = React.useState([]);
  const [showAmort, setShowAmort] = React.useState(false);
  const [contact,   setContact]   = React.useState(null);
  const [checks,    setChecks]    = React.useState({ owner:false, terms:false });
  const [waSent,    setWaSent]    = React.useState(false);

  const tcVal     = tc  || cfg.general?.tcFallback || 3.77;
  const waNum     = cfg.general?.whatsappNumber    || WA_NUMBER;
  const loanTerms = cfg.credito?.terms             || DEFAULT_CONFIG.credito.terms;
  const enabled   = Object.entries(loanTerms).filter(([, v]) => v.enabled).map(([k]) => parseInt(k)).sort((a,b)=>a-b);

  // Eligibility recalculates when vehicle changes
  const elig = React.useMemo(() => {
    if (!vehicle?.brand || !vehicle?.model || !vehicle?.year) return null;
    return checkEligibility(vehicle.brand, vehicle.model, vehicle.year, cfg);
  }, [vehicle, cfg]);

  // Auto-valuate when vehicle is complete + eligible
  React.useEffect(() => {
    if (elig?.eligible && vehicle?.km && vehicle?.transmission && vehicle?.condition) {
      const vr = valuate(vehicle.brand, vehicle.model, vehicle.year, vehicle.km, vehicle.transmission, vehicle.condition, vehicle.version);
      setVResult(vr);
    } else {
      setVResult(null);
      setResult(null);
    }
  }, [elig, vehicle]);

  // maxLoan in SOLES
  const maxLoanUSD  = vResult && elig ? Math.round(vResult.conservativeValue * elig.maxLTV / 500) * 500 : 0;
  const maxLoanS    = Math.round(maxLoanUSD * tcVal / 500) * 500;
  const amountSNum  = parseFloat(amountS) || 0;
  const amountUSD   = amountSNum / tcVal;

  const doCalc = () => {
    if (!vResult || !term || !amountSNum || !elig?.eligible) return;
    const termN  = parseInt(term);
    const lt     = loanTerms[termN];
    const r      = lt.monthlyRate;
    const amtUSD = amountSNum / tcVal;
    const comm   = Math.round(amtUSD * lt.disbursementCommissionPct);
    const pmt    = amtUSD * (r * Math.pow(1 + r, termN)) / (Math.pow(1 + r, termN) - 1);
    const total  = pmt * termN;
    const tea    = (Math.pow(1 + r, 12) - 1) * 100;
    const ltv    = amtUSD / vResult.conservativeValue * 100;
    const sch    = buildAmortization(amtUSD, r, termN);
    setResult({ vr:vResult, termN, r, amtUSD, amtS:amountSNum, comm, commS:Math.round(comm*tcVal), pmt:Math.round(pmt), pmtS:Math.round(pmt*tcVal), total:Math.round(total), totalS:Math.round(total*tcVal), tea, maxLoanUSD, maxLoanS, ltv, lt });
    setSchedule(sch);
    trackLead("credito_quote", { ...vehicle, amountUSD:amtUSD, amountSoles:amountSNum, term:termN, monthlyPaymentUSD:Math.round(pmt), maxLoanUSD, tcUsed:tcVal });
  };

  const canWA = isContactValid(contact) && checks.owner && checks.terms && !!result;

  const doWA = () => {
    if (!canWA) return;
    setWaSent(true);
    trackLead("credito_whatsapp", { ...vehicle, ...contact, amountSoles:result.amtS, term:result.termN, monthlyPaymentSoles:result.pmtS, tcUsed:tcVal });
    const msg = encodeURIComponent(
      `Hola AutoPago! Acepto el préstamo con las siguientes condiciones:\n` +
      `🚗 ${vehicle.brand} ${vehicle.model} ${vehicle.version || ""} ${vehicle.year}\n` +
      `📍 ${parseInt(vehicle.km).toLocaleString()}km · ${vehicle.transmission === "automatica" ? "AT" : "MT"}\n` +
      `🏦 Monto solicitado: $${Math.round(result.amtUSD).toLocaleString()} (S/ ${result.amtS.toLocaleString()})\n` +
      `📅 Plazo: ${result.termN} meses · Cuota: $${result.pmt.toLocaleString()}/mes (S/ ${result.pmtS.toLocaleString()})\n` +
      `💸 Comisión desembolso: $${result.comm.toLocaleString()} (S/ ${result.commS.toLocaleString()})\n` +
      `📊 TEA ref.: ${result.tea.toFixed(1)}%\n` +
      `👤 ${contact.firstName} ${contact.lastName} · ${contact.docType?.toUpperCase()} ${contact.docNum} · +51${contact.phone}`
    );
    window.open(`https://wa.me/${waNum}?text=${msg}`, "_blank");
  };

  return (

        {[["📋","Solicitas"],["🔍","Peritaje"],["📄","Notaría"],["💰","Cobras en 24h"]].map(([ic,t],i,arr) => (
          <React.Fragment key={t}>

              ].map(k => (
                <div key={k.l} style={{ textAlign:"center", background:"rgba(255,255,255,.05)", borderRadius:12, padding:"14px 8px" }}>
                  <p style={{ fontSize:9, color:"#64748B", fontWeight:700, marginBottom:4, letterSpacing:".06em" }}>{k.l.toUpperCase()}</p>
                  <p style={{ fontSize:16, fontWeight:800, color:k.c, fontFamily:"'DM Mono',monospace" }}>{k.v}</p>
                  <p style={{ fontSize:9, color:"#475569", marginTop:3 }}>{k.sub}</p>
                </div>
              ))}
            </div>

            {/* Rates */}
            <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:14, padding:"10px 12px", background:"rgba(255,255,255,.03)", borderRadius:10 }}>
              {[
                [`${(result.r*100).toFixed(1)}% mensual`,"Tasa pactada"],
                [`TEA ~${result.tea.toFixed(1)}%`,"Tasa efectiva anual"],
                [`LTV ${result.ltv.toFixed(1)}%`,"Sobre valor conservador"],
              ].map(([v,l]) => (
                <div key={l}>
                  <span style={{ fontSize:13, color:"#93C5FD", fontWeight:700 }}>{v}</span>
                  <span style={{ fontSize:11, color:"#475569", marginLeft:4 }}>{l}</span>
                </div>
              ))}
              <TcBadge />
            </div>

            {/* Chart */}
            <div style={{ background:"rgba(255,255,255,.03)", borderRadius:14, padding:"14px", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <p style={{ fontSize:12, fontWeight:700, color:"#93C5FD" }}>Cronograma de pagos</p>
                <div style={{ display:"flex", gap:10 }}>
                  {[["#3B82F6","Capital"],["#EF4444","Interés"],["#FBBF24","── Saldo"]].map(([c,l])=>(
                    <span key={l} style={{ fontSize:10, color:c }}>{l}</span>
                  ))}
                </div>
              </div>
              <AmortChart schedule={schedule} />
            </div>

            <button type="button" onClick={() => setShowAmort(v => !v)}
              style={{ background:"none", border:"none", color:"#60A5FA", cursor:"pointer", fontSize:12, fontWeight:700, padding:0 }}>
              {showAmort ? "▲ Ocultar tabla" : "▼ Ver cronograma completo"}
            </button>
            {showAmort && (
              <div className="ap-scroll" style={{ marginTop:12, maxHeight:220, overflowY:"auto" }}>
                <table className="ap-table" style={{ minWidth:440 }}>
                  <thead><tr><th>Mes</th><th>Cuota ($)</th><th>Capital</th><th>Interés</th><th>Saldo</th></tr></thead>
                  <tbody>
                    {schedule.map(r => (
                      <tr key={r.period}>
                        <td className="mono">{r.period}</td>
                        <td className="mono" style={{ color:"#A78BFA" }}>${Math.round(r.payment).toLocaleString()}</td>
                        <td className="mono" style={{ color:"#93C5FD" }}>${Math.round(r.principal).toLocaleString()}</td>
                        <td className="mono" style={{ color:"#FCA5A5" }}>${Math.round(r.interest).toLocaleString()}</td>
                        <td className="mono">${Math.round(r.balance).toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Proceso stepper — colapsable */}
          <CreditStepper termN={result.termN} pmtS={result.pmtS} totalS={result.totalS} />

          {/* Contact */}
          <div className="ap-card" style={{ marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
              <StepBadge n={3} active />
              <div>
                <h3 style={{ fontSize:15, fontWeight:700, color:"#93C5FD" }}>Tus datos</h3>
                <p style={{ fontSize:11, color:"#475569", marginTop:1 }}>Para coordinar el peritaje</p>
              </div>
            </div>
            <ContactForm value={contact} onChange={setContact} />
          </div>

          <div className="ap-card" style={{ marginBottom:16 }}>
            <LegalChecks values={checks} onChange={setChecks} />
          </div>

          <button className="ap-btn ap-btn-success" type="button" onClick={doWA}
            disabled={!canWA} style={{ width:"100%", padding:"16px", fontSize:15 }}>
            {waSent ? "✅ ¡Solicitud enviada!" : "💬 Solicitar préstamo ahora →"}
          </button>
          {!canWA && (
            <p style={{ fontSize:11, color:"#475569", textAlign:"center", marginTop:8 }}>
              {!isContactValid(contact) ? "Completa tus datos · " : ""}
              {(!checks.owner || !checks.terms) ? "Acepta las declaraciones obligatorias" : ""}
            </p>
          )}
        </>
      )}
    </div>
  );
}

// ║  E7: SHOWROOM (v2 — filtros mobile optimizados)            ║
// ╚══════════════════════════════════════════════════════════════╝

function ShowroomModule() {
  const { tc, cfg } = React.useContext(AppCtx);
  const [inv,      setInv]      = React.useState(() => loadInventory());
  const [filtersOpen, setFiltersOpen] = React.useState(false);
  const [brandF,   setBrandF]   = React.useState("Todas");
  const [modelF,   setModelF]   = React.useState("Todos");
  const [transF,   setTransF]   = React.useState("Todas");
  const [yearFrom, setYearFrom] = React.useState("");
  const [yearTo,   setYearTo]   = React.useState("");
  const [maxPrice, setMaxPrice] = React.useState("");
  const [search,   setSearch]   = React.useState("");
  const [selected, setSelected] = React.useState(null);
  const [sentIds,  setSentIds]  = React.useState(new Set());

  const tcVal = tc  || cfg.general?.tcFallback || 3.77;
  const waNum = cfg.general?.whatsappNumber    || WA_NUMBER;

  React.useEffect(() => {
    const fn = () => setInv(loadInventory());
    window.addEventListener("apInventoryUpdated", fn);
    return () => window.removeEventListener("apInventoryUpdated", fn);
  }, []);

  const active = inv.filter(c => c.active);
  const brands = ["Todas", ...[...new Set(active.map(c => c.brand))].sort()];
  const models = brandF === "Todas" ? ["Todos"] : ["Todos", ...[...new Set(active.filter(c => c.brand === brandF).map(c => c.model))].sort()];
  const years  = Array.from({ length: CURRENT_YEAR - 2009 }, (_, i) => CURRENT_YEAR - i);

  const filtered = React.useMemo(() => {
    return active.filter(c => {
      if (brandF   !== "Todas" && c.brand        !== brandF) return false;
      if (modelF   !== "Todos" && c.model        !== modelF) return false;
      if (transF   !== "Todas" && c.transmission  !== transF) return false;
      if (yearFrom && c.year < parseInt(yearFrom))           return false;
      if (yearTo   && c.year > parseInt(yearTo))             return false;
      if (maxPrice && c.price > parseFloat(maxPrice))        return false;
      if (search) {
        const q = search.toLowerCase();
        if (![c.brand, c.model, c.version||"", String(c.year), c.color||""].join(" ").toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [active, brandF, modelF, transF, yearFrom, yearTo, maxPrice, search]);

  const hasFilters = brandF !== "Todas" || modelF !== "Todos" || transF !== "Todas" || yearFrom || yearTo || maxPrice || search;
  const clearFilters = () => { setBrandF("Todas"); setModelF("Todos"); setTransF("Todas"); setYearFrom(""); setYearTo(""); setMaxPrice(""); setSearch(""); };

  const handleInterest = (car, e) => {
    if (e) e.stopPropagation();
    setSentIds(s => new Set([...s, car.id]));
    trackLead("showroom_interest", { carId:car.id, brand:car.brand, model:car.model, year:car.year, price:car.price, tcUsed:tcVal });
    const tpl = cfg.showroom?.waTemplate || "Hola AutoPago! Me interesa: {brand} {model} {version} {year} · S/ {price_soles} (~${price_usd})";
    const msg = encodeURIComponent(tpl
      .replace("{brand}",car.brand).replace("{model}",car.model)
      .replace("{version}",car.version||"").replace("{year}",car.year)
      .replace("{price_soles}",Math.round(car.price*tcVal).toLocaleString("es-PE"))
      .replace("{price_usd}",car.price.toLocaleString())
    );
    window.open(`https://wa.me/${waNum}?text=${msg}`, "_blank");
  };

  const condColor = { excelente:"#10B981", bueno:"#60A5FA", regular:"#F59E0B", malo:"#EF4444" };

  return (
    <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 16px" }}>
      <div style={{ marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:8 }}>
        <div>
          <h2 className="section-title">🏪 Showroom</h2>
          <p className="section-sub">{filtered.length} vehículo{filtered.length !== 1 ? "s" : ""} disponible{filtered.length !== 1 ? "s" : ""}</p>
        </div>
      </div>

      {/* ── FILTROS — compactos en mobile ── */}
      <div className="ap-card" style={{ marginBottom:20, padding:"12px 14px" }}>
        {/* Siempre visible: search + toggle */}
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input className="ap-input" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="🔍 Buscar por marca, modelo, color…"
            style={{ flex:1, fontSize:13 }} />
          <button type="button" onClick={() => setFiltersOpen(v => !v)}
            style={{ padding:"10px 14px", borderRadius:12, border:`1px solid ${filtersOpen ? "#3B82F6" : "rgba(255,255,255,.12)"}`, background: filtersOpen ? "rgba(37,99,235,.2)" : "rgba(255,255,255,.06)", color: filtersOpen ? "#93C5FD" : "#94A3B8", cursor:"pointer", fontWeight:700, fontSize:12, whiteSpace:"nowrap", fontFamily:"inherit", flexShrink:0 }}>
            {hasFilters ? `🔧 Filtros (${[brandF!=="Todas",modelF!=="Todos",transF!=="Todas",yearFrom,yearTo,maxPrice].filter(Boolean).length})` : "🔧 Filtros"}
            {filtersOpen ? " ▲" : " ▼"}
          </button>
          {hasFilters && (
            <button type="button" onClick={clearFilters}
              style={{ padding:"10px 12px", borderRadius:12, border:"1px solid rgba(239,68,68,.3)", background:"rgba(239,68,68,.07)", color:"#FCA5A5", cursor:"pointer", fontWeight:700, fontSize:12, whiteSpace:"nowrap", fontFamily:"inherit", flexShrink:0 }}>
              ✕
            </button>
          )}
        </div>

        {/* Expandable filter panel */}
        {filtersOpen && (
          <div style={{ marginTop:12, paddingTop:12, borderTop:"1px solid rgba(255,255,255,.07)", display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:10, animation:"fadeUp .2s ease" }}>
            <div>
              <label className="ap-label">Marca</label>
              <select className="ap-input" value={brandF} onChange={e => { setBrandF(e.target.value); setModelF("Todos"); }}>
                {brands.map(b => <option key={b}>{b}</option>)}
              </select>
            </div>
            <div>
              <label className="ap-label">Modelo</label>
              <select className="ap-input" value={modelF} onChange={e => setModelF(e.target.value)} disabled={brandF === "Todas"}>
                {models.map(m => <option key={m}>{m}</option>)}
              </select>
            </div>
            <div>
              <label className="ap-label">Transmisión</label>
              <select className="ap-input" value={transF} onChange={e => setTransF(e.target.value)}>
                <option value="Todas">Todas</option>
                <option value="automatica">Automática</option>
                <option value="manual">Manual</option>
              </select>
            </div>
            <div>
              <label className="ap-label">Año desde</label>
              <select className="ap-input" value={yearFrom} onChange={e => setYearFrom(e.target.value)}>
                <option value="">Cualquiera</option>
                {years.map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
            <div>
              <label className="ap-label">Año hasta</label>
              <select className="ap-input" value={yearTo} onChange={e => setYearTo(e.target.value)}>
                <option value="">Cualquiera</option>
                {years.map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
            <div>
              <label className="ap-label">Precio máx. (USD)</label>
              <input className="ap-input" type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} placeholder="Sin límite" />
            </div>
          </div>
        )}
      </div>

      {/* Grid */}
      {filtered.length === 0 ? (
        <div style={{ textAlign:"center", padding:"60px 20px", color:"#475569" }}>
          <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
          <p style={{ fontSize:16, fontWeight:700, color:"#94A3B8" }}>Sin vehículos con esos filtros</p>
          {hasFilters && (
            <button className="ap-btn ap-btn-sm ap-btn-secondary" type="button" onClick={clearFilters} style={{ marginTop:12 }}>
              Ver todos los vehículos
            </button>
          )}
        </div>
      ) : (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
          {filtered.map(car => (
            <div key={car.id} className="ap-card"
              style={{ padding:0, overflow:"hidden", cursor:"pointer", transition:"transform .2s,box-shadow .2s" }}
              onClick={() => setSelected(car)}
              onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 32px rgba(0,0,0,.3)"; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>

              <div style={{ position:"relative" }}>
                <img src={car.photos?.[0] || "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=600&q=80"}
                  alt={`${car.brand} ${car.model}`}
                  style={{ width:"100%", aspectRatio:"16/9", objectFit:"cover" }} />
                {car.featured && <span className="featured-badge" style={{ position:"absolute", top:10, left:10 }}>⭐ DESTACADO</span>}
                <span style={{ position:"absolute", top:10, right:10, background:"rgba(0,0,0,.7)", borderRadius:8, padding:"3px 10px", fontSize:11, fontWeight:700, color: condColor[car.condition]||"#fff" }}>
                  {car.condition?.charAt(0).toUpperCase() + car.condition?.slice(1)}
                </span>
              </div>

              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <p style={{ fontSize:15, fontWeight:800, color:"#F1F5F9" }}>{car.brand} {car.model}</p>
                    <p style={{ fontSize:11, color:"#64748B" }}>{car.version} · {car.year}</p>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <p style={{ fontSize:15, fontWeight:800, color:"#60A5FA", fontFamily:"'DM Mono',monospace" }}>
                      ${car.price.toLocaleString()}
                    </p>
                    <p style={{ fontSize:10, color:"#475569" }}>S/ {Math.round(car.price * tcVal).toLocaleString("es-PE")}</p>
                  </div>
                </div>

                <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:12 }}>
                  {[`${car.km.toLocaleString()} km`, car.transmission==="automatica"?"AT":"MT", car.fuel||"", car.color||""].filter(Boolean).map(t => (
                    <span key={t} style={{ fontSize:10, color:"#94A3B8", background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.07)", borderRadius:6, padding:"2px 7px" }}>{t}</span>
                  ))}
                </div>

                <button className="ap-btn ap-btn-success" type="button"
                  onClick={e => handleInterest(car, e)}
                  style={{ width:"100%", padding:"10px", fontSize:13 }}>
                  {sentIds.has(car.id) ? "✅ Interés enviado" : "💬 Me interesa"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal */}
      {selected && (
        <div onClick={() => setSelected(null)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.84)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"linear-gradient(135deg,#0B1A3E,#0D2050)", border:"1px solid rgba(59,130,246,.3)", borderRadius:24, maxWidth:520, width:"100%", maxHeight:"92vh", overflowY:"auto" }}>

            <div style={{ position:"relative" }}>
              <img src={selected.photos?.[0]||"https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=600&q=80"} alt="" style={{ width:"100%", height:210, objectFit:"cover", borderRadius:"24px 24px 0 0" }} />
              <button type="button" onClick={() => setSelected(null)}
                style={{ position:"absolute", top:10, right:10, width:30, height:30, borderRadius:"50%", background:"rgba(0,0,0,.7)", border:"none", color:"#fff", cursor:"pointer", fontSize:14 }}>✕</button>
            </div>

            {selected.photos?.length > 1 && (
              <div style={{ display:"flex", gap:6, overflowX:"auto", padding:"8px 16px 0" }}>
                {selected.photos.slice(1).map((ph,i) => (
                  <img key={i} src={ph} alt="" style={{ width:72, height:52, objectFit:"cover", borderRadius:8, border:"1px solid rgba(255,255,255,.1)", flexShrink:0 }} />
                ))}
              </div>
            )}

            <div style={{ padding:"20px 22px 24px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                <div>
                  <h3 style={{ fontSize:20, fontWeight:800, color:"#F1F5F9" }}>{selected.brand} {selected.model}</h3>
                  <p style={{ color:"#64748B", fontSize:13 }}>{selected.version} · {selected.year}</p>
                </div>
                <div style={{ textAlign:"right" }}>
                  <p style={{ fontSize:22, fontWeight:800, color:"#10B981", fontFamily:"'DM Mono',monospace" }}>
                    ${selected.price.toLocaleString()}
                  </p>
                  <p style={{ fontSize:11, color:"#475569" }}>S/ {Math.round(selected.price*tcVal).toLocaleString("es-PE")}</p>
                </div>
              </div>

              <div className="grid-2" style={{ marginBottom:16 }}>
                {[["Km",`${selected.km.toLocaleString()} km`],["Transmisión",selected.transmission==="automatica"?"Automática":"Manual"],["Combustible",selected.fuel||"—"],["Condición",selected.condition||"—"],["Color",selected.color||"—"],["Año",selected.year]].filter(([,v])=>v&&v!=="—").map(([k,v])=>(
                  <div key={k} style={{ background:"rgba(255,255,255,.04)", borderRadius:10, padding:"8px 12px" }}>
                    <p style={{ fontSize:9, color:"#64748B", fontWeight:700, marginBottom:1 }}>{k.toUpperCase()}</p>
                    <p style={{ fontSize:13, fontWeight:700, color:"#E2E8F0" }}>{v}</p>
                  </div>
                ))}
              </div>

              <TcBadge />
              <button className="ap-btn ap-btn-success" type="button"
                onClick={e => handleInterest(selected, e)}
                style={{ width:"100%", padding:"14px", marginTop:14, fontSize:14 }}>
                {sentIds.has(selected.id) ? "✅ ¡Interés enviado!" : "💬 Me interesa este auto →"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ║  E8: ADMIN PANEL (v2 — pro upgrade)                        ║
// ╚══════════════════════════════════════════════════════════════╝

const ROLE_ACCESS = {
  owner   : ["dashboard","leads","credits","showroom","config","users"],
  admin   : ["dashboard","leads","credits","showroom","config"],
  analyst : ["dashboard","leads","credits","showroom"],
  viewer  : ["dashboard"],
};
const canAccess = (role, section) => (ROLE_ACCESS[role] || []).includes(section);

// ─── ADMIN LOGIN ───────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [email,   setEmail]   = React.useState("");
  const [pass,    setPass]    = React.useState("");
  const [err,     setErr]     = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [showPass,setShowPass]= React.useState(false);

  const doLogin = () => {
    setErr(""); setLoading(true);
    setTimeout(() => {
      const u = loadUsers().find(u => u.email === email && u.password === pass && u.isActive);
      if (u) {
        const s = { userId:u.id, email:u.email, role:u.role, loginAt:new Date().toISOString() };
        saveSession(s);
        onLogin(s);
      } else {
        setErr("Credenciales incorrectas o cuenta inactiva");
      }
      setLoading(false);
    }, 500);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20, background:"radial-gradient(ellipse at 50% 0%,rgba(37,99,235,.15) 0%,transparent 70%)" }}>
      <div style={{ width:"100%", maxWidth:380 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:56, height:56, borderRadius:16, background:"linear-gradient(135deg,#2563EB,#7C3AED)", margin:"0 auto 14px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, boxShadow:"0 8px 32px rgba(37,99,235,.3)" }}>🔐</div>
          <h2 style={{ fontSize:22, fontWeight:800, color:"#F1F5F9" }}>
            Auto<span style={{ color:"#60A5FA" }}>Pago</span> Admin
          </h2>
          <p style={{ fontSize:12, color:"#64748B", marginTop:4 }}>Panel de administración interno</p>
        </div>
        <div className="ap-card" style={{ boxShadow:"0 20px 60px rgba(0,0,0,.4)" }}>
          <div style={{ marginBottom:14 }}>
            <label className="ap-label">Email</label>
            <input className="ap-input" type="email" value={email}
              onChange={e => setEmail(e.target.value)} placeholder="admin@autopago.pe"
              onKeyDown={e => e.key === "Enter" && doLogin()} autoFocus />
          </div>
          <div style={{ marginBottom:20 }}>
            <label className="ap-label">Contraseña</label>
            <div style={{ position:"relative" }}>
              <input className="ap-input" type={showPass?"text":"password"} value={pass}
                onChange={e => setPass(e.target.value)} placeholder="••••••••"
                onKeyDown={e => e.key === "Enter" && doLogin()}
                style={{ paddingRight:42 }} />
              <button type="button" onClick={() => setShowPass(v=>!v)}
                style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#64748B", cursor:"pointer", fontSize:14 }}>
                {showPass ? "🙈" : "👁"}
              </button>
            </div>
          </div>
          {err && (
            <div style={{ background:"rgba(239,68,68,.1)", border:"1px solid rgba(239,68,68,.25)", borderRadius:10, padding:"9px 12px", fontSize:12, color:"#FCA5A5", marginBottom:16, display:"flex", gap:6, alignItems:"center" }}>
              <span>⚠️</span> {err}
            </div>
          )}
          <button className="ap-btn ap-btn-primary" type="button" onClick={doLogin}
            disabled={loading || !email || !pass} style={{ width:"100%", padding:"13px" }}>
            {loading ? "⏳ Verificando…" : "Ingresar al panel →"}
          </button>
          <div style={{ fontSize:10, color:"#334155", textAlign:"center", marginTop:16, lineHeight:1.8, padding:"12px", background:"rgba(255,255,255,.02)", borderRadius:10, border:"1px solid rgba(255,255,255,.05)" }}>
            <p style={{ marginBottom:4, color:"#475569", fontWeight:700 }}>Credenciales de demo</p>
